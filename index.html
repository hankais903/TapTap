<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- 對抗 iOS WKWebView 快取，桌面 app 才會抓最新版 -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- iOS 桌面 app 設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NEON BEAT" />
  <meta name="theme-color" content="#050810" />

  <title>NEON BEAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #050810;
      --bg-mid: #0a1220;
      --neon-cyan: #00eaff;
      --neon-magenta: #ff2e9f;
      --neon-yellow: #ffd700;
      --neon-green: #4ade80;
      --neon-red: #ff4757;
      --text: #e8edf5;
      --text-dim: #6b7a90;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background:
        radial-gradient(ellipse at top, rgba(0, 234, 255, 0.08), transparent 50%),
        radial-gradient(ellipse at bottom, rgba(255, 46, 159, 0.05), transparent 50%),
        var(--bg-deep);
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0, 234, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 234, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    #game-canvas { display: block; margin: 0 auto; position: relative; z-index: 1; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 28px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }
    .hud-item { font-family: 'Orbitron', sans-serif; }
    .hud-label { font-size: 10px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .hud-value { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    #score-display .hud-value { color: var(--neon-cyan); text-shadow: 0 0 14px rgba(0, 234, 255, 0.5); }
    #combo-display { text-align: center; flex: 1; transition: transform 0.08s; }
    #combo-display.pop { transform: scale(1.08); }
    #combo-display .hud-value { font-size: 56px; font-weight: 900; color: var(--neon-magenta); text-shadow: 0 0 22px rgba(255, 46, 159, 0.6); line-height: 1; }
    #combo-display.zero .hud-value { opacity: 0; }
    #combo-display.zero .hud-label { opacity: 0.3; }
    #accuracy-display { text-align: right; }

    /* 共用 overlay */
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: radial-gradient(ellipse at center, rgba(10, 18, 32, 0.95), rgba(5, 8, 16, 0.98) 70%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      transition: opacity 0.4s;
      padding: 24px;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-header {
      text-align: center;
      padding: 20px 0 32px;
    }
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 900; letter-spacing: 0.12em;
      background: linear-gradient(90deg, var(--neon-cyan) 0%, #b388ff 50%, var(--neon-magenta) 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 30px rgba(0, 234, 255, 0.4));
      line-height: 1;
    }
    .tagline {
      margin-top: 6px;
      font-size: 11px; letter-spacing: 0.4em;
      color: var(--text-dim); text-transform: uppercase;
    }

    /* Song list */
    .song-list-wrapper {
      flex: 1; overflow-y: auto;
      max-width: 540px; width: 100%;
      margin: 0 auto;
      padding: 0 4px 24px;
    }
    .song-list-wrapper::-webkit-scrollbar { width: 4px; }
    .song-list-wrapper::-webkit-scrollbar-thumb { background: var(--text-dim); }

    .song-list-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 0.4em;
      color: var(--text-dim); text-transform: uppercase;
      margin: 8px 4px 14px;
    }

    .song-card {
      display: flex; align-items: stretch;
      background: rgba(10, 18, 32, 0.6);
      border: 1px solid var(--text-dim);
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.18s;
      overflow: hidden;
    }
    .song-card:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 24px rgba(0, 234, 255, 0.2);
      background: rgba(0, 234, 255, 0.06);
    }
    .song-card .cover {
      width: 80px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      position: relative;
      isolation: isolate; /* iOS Safari: 建立 stacking context 讓 z-index 正確生效 */
    }
    .song-card .cover::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(5, 8, 16, 0.35);
      z-index: 1;
      pointer-events: none; /* 不擋點擊事件 */
    }
    /* YouTube 連結 (位於封面右下角) */
    .song-card .yt-link {
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: 26px;
      height: 18px;
      background: #ff0000;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      transition: transform 0.12s, box-shadow 0.12s;
      z-index: 5; /* 高於 ::after 的 z-index: 1 */
      text-decoration: none;
    }
    .song-card .yt-link:hover, .song-card .yt-link:active {
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
    }
    .song-card .yt-link svg {
      display: block;
      transform: translateX(1px); /* 視覺對齊：play 三角形偏右一點才置中 */
    }
    .song-card .info {
      flex: 1;
      padding: 14px 16px;
      display: flex; flex-direction: column; justify-content: center;
      min-width: 0;
    }
    .song-card .name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700; font-size: 16px;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-card .artist {
      font-size: 11px; color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .song-card .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .song-card .high-scores {
      display: flex; gap: 10px;
      margin-top: 8px;
    }
    .high-score { font-size: 10px; }
    .high-score .label { color: var(--text-dim); }
    .high-score .v { font-family: 'Orbitron', sans-serif; font-weight: 700; margin-left: 4px; }
    .high-score.easy   .v { color: var(--neon-green); }
    .high-score.normal .v { color: var(--neon-cyan); }
    .high-score.hard   .v { color: var(--neon-magenta); }
    .high-score.insane .v { color: var(--neon-red); }

    /* 卡片下方動作按鈕 */
    .song-card .actions {
      display: flex; gap: 8px;
      margin-top: 12px;
    }
    .song-card .action-btn {
      flex: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 9px 0;
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
    }
    .song-card .action-btn.preview {
      border-color: rgba(0, 234, 255, 0.4);
      color: var(--neon-cyan);
    }
    .song-card .action-btn.preview:hover,
    .song-card .action-btn.preview:active {
      background: rgba(0, 234, 255, 0.12);
      border-color: var(--neon-cyan);
    }
    .song-card .action-btn.preview.playing {
      background: rgba(0, 234, 255, 0.18);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      animation: preview-pulse 1.2s ease-in-out infinite;
    }
    @keyframes preview-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(0, 234, 255, 0); }
      50%      { box-shadow: 0 0 18px rgba(0, 234, 255, 0.45); }
    }
    .song-card .action-btn.start {
      border-color: rgba(255, 46, 159, 0.5);
      color: var(--neon-magenta);
    }
    .song-card .action-btn.start:hover,
    .song-card .action-btn.start:active {
      background: var(--neon-magenta);
      border-color: var(--neon-magenta);
      color: var(--bg-deep);
      box-shadow: 0 0 24px rgba(255, 46, 159, 0.4);
    }
    .high-score.hard   .v { color: var(--neon-magenta); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.7;
    }
    .empty-state code {
      display: block;
      margin: 8px auto;
      padding: 8px 12px;
      max-width: 380px;
      background: rgba(0, 234, 255, 0.06);
      border-left: 2px solid var(--neon-cyan);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-align: left;
      white-space: pre-wrap;
    }

    /* Song detail / difficulty select */
    .detail-content {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      max-width: 520px; width: 100%;
      margin: 0 auto;
    }
    .back-btn {
      position: absolute; top: 24px; left: 24px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: var(--text-dim);
      background: transparent; border: none;
      cursor: pointer;
      text-transform: uppercase;
      padding: 8px 12px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--neon-cyan); }

    .detail-song-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 6px;
    }
    .detail-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    .difficulty-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 0.4em;
      color: var(--text-dim); text-transform: uppercase;
      margin-bottom: 14px;
    }
    .difficulty-options {
      display: flex; flex-direction: column; gap: 8px;
      width: 100%; max-width: 360px;
      margin-bottom: 32px;
    }
    .diff-btn {
      font-family: 'Orbitron', sans-serif;
      padding: 14px 18px;
      background: rgba(10, 18, 32, 0.6);
      color: var(--text);
      border: 1px solid var(--text-dim);
      cursor: pointer;
      transition: all 0.18s;
      display: flex; justify-content: space-between; align-items: center;
      text-align: left;
      letter-spacing: 0.1em;
    }
    .diff-btn:hover, .diff-btn.selected {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 24px rgba(0, 234, 255, 0.3);
      background: rgba(0, 234, 255, 0.06);
    }
    .diff-btn .diff-name { font-weight: 700; font-size: 14px; }
    .diff-btn .diff-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em; }
    .diff-btn[data-diff="easy"]   .diff-name { color: var(--neon-green); }
    .diff-btn[data-diff="normal"] .diff-name { color: var(--neon-cyan); }
    .diff-btn[data-diff="hard"]   .diff-name { color: var(--neon-magenta); }
    .diff-btn[data-diff="insane"] .diff-name {
      color: var(--neon-red);
      text-shadow: 0 0 10px rgba(255, 71, 87, 0.6);
    }
    .diff-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .diff-btn:disabled:hover {
      border-color: var(--text-dim);
      box-shadow: none;
      background: rgba(10, 18, 32, 0.6);
    }

    .start-button {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.3em;
      padding: 16px 56px;
      background: transparent;
      color: var(--neon-cyan);
      border: 2px solid var(--neon-cyan);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .start-button:hover {
      background: var(--neon-cyan);
      color: var(--bg-deep);
      box-shadow: 0 0 40px rgba(0, 234, 255, 0.5);
    }
    .start-button:disabled { opacity: 0.4; cursor: not-allowed; }

    .key-hints { margin-top: 28px; display: flex; gap: 8px; }
    .key {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700; font-size: 16px;
      border: 1px solid var(--text-dim);
      color: var(--text);
      background: rgba(10, 18, 32, 0.6);
    }

    .loading-text {
      margin-top: 18px;
      font-size: 10px; letter-spacing: 0.3em;
      color: var(--text-dim); text-transform: uppercase;
    }

    /* Results */
    #results-screen {
      align-items: center; justify-content: center;
    }
    .results-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; letter-spacing: 0.4em;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .results-grade {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(140px, 28vw, 220px);
      font-weight: 900; line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--neon-yellow), var(--neon-magenta));
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.4));
    }
    .results-score {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 700;
      color: var(--neon-cyan);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .new-record {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; letter-spacing: 0.3em;
      color: var(--neon-yellow);
      margin-bottom: 30px;
      text-transform: uppercase;
      animation: pulse 1.2s ease-in-out infinite;
      height: 16px;
    }
    .new-record.hidden { opacity: 0; }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
    }

    /* Perfect / Full Combo 徽章 (大且明顯) */
    .results-perfect-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(38px, 8vw, 64px);
      font-weight: 900;
      letter-spacing: 0.18em;
      margin: -4px 0 14px;
      padding: 0 18px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;

      /* 用實心金色 + 多層光暈，所有手機都能正確顯示 */
      color: #ffd700;
      text-shadow:
        0 0 8px rgba(255, 215, 0, 0.95),
        0 0 22px rgba(255, 215, 0, 0.7),
        0 0 36px rgba(255, 46, 159, 0.55),
        0 0 64px rgba(255, 215, 0, 0.35);

      animation: perfect-pulse 1.4s ease-in-out infinite,
                 perfect-glow 2.0s ease-in-out infinite;
    }
    .results-perfect-badge.hidden { display: none; }
    .results-perfect-badge.full-combo {
      color: #00eaff;
      text-shadow:
        0 0 8px rgba(0, 234, 255, 0.95),
        0 0 22px rgba(0, 234, 255, 0.7),
        0 0 36px rgba(74, 222, 128, 0.45),
        0 0 64px rgba(0, 234, 255, 0.3);
    }
    @keyframes perfect-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.07); }
    }
    @keyframes perfect-glow {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.3); }
    }

    /* Max Combo 行 */
    .results-max-combo {
      display: flex; align-items: baseline; justify-content: center;
      gap: 14px;
      margin-bottom: 26px;
    }
    .mc-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .mc-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--neon-magenta);
      text-shadow: 0 0 14px rgba(255, 46, 159, 0.5);
      letter-spacing: 0.05em;
    }
    .results-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 20px; margin-bottom: 32px;
      max-width: 480px; width: 100%;
    }
    .stat { text-align: center; }
    .stat-label { font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; }
    .stat.perfect .stat-value { color: var(--neon-yellow); }
    .stat.good    .stat-value { color: var(--neon-green); }
    .stat.okay    .stat-value { color: var(--neon-cyan); }
    .stat.miss    .stat-value { color: var(--neon-red); }
    .results-buttons { display: flex; gap: 12px; }
    .btn-secondary {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.3em;
      padding: 16px 32px;
      background: transparent;
      color: var(--text-dim);
      border: 2px solid var(--text-dim);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--text); }

    .footer-hint {
      position: fixed; bottom: 14px; left: 0; right: 0;
      text-align: center;
      font-size: 10px; letter-spacing: 0.3em;
      color: var(--text-dim); text-transform: uppercase;
      pointer-events: none; z-index: 5;
    }

    /* 遊玩中的退出按鈕 (右下角) */
    .game-exit-btn {
      position: fixed;
      bottom: 14px;
      right: 14px;
      width: 40px; height: 40px;
      background: rgba(10, 18, 32, 0.75);
      border: 1px solid rgba(107, 122, 144, 0.5);
      color: var(--text-dim);
      font-size: 16px;
      font-family: 'Orbitron', sans-serif;
      cursor: pointer;
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .game-exit-btn:hover, .game-exit-btn:active {
      color: var(--neon-red);
      border-color: var(--neon-red);
      background: rgba(255, 71, 87, 0.12);
      box-shadow: 0 0 18px rgba(255, 71, 87, 0.4);
    }
    .game-exit-btn.hidden { display: none; }

    /* 確認退出對話框 */
    .confirm-modal {
      position: fixed; inset: 0;
      background: rgba(5, 8, 16, 0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .confirm-modal.hidden { display: none; }
    .confirm-box {
      background: var(--bg-mid);
      border: 1px solid var(--neon-red);
      box-shadow: 0 0 40px rgba(255, 71, 87, 0.25),
                  0 8px 60px rgba(0, 0, 0, 0.6);
      padding: 30px 28px 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      animation: confirm-pop 0.18s ease-out;
    }
    @keyframes confirm-pop {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .confirm-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .confirm-desc {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      margin-bottom: 26px;
    }
    .confirm-buttons {
      display: flex; gap: 10px;
    }
    .confirm-btn {
      flex: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.25em;
      padding: 14px 0;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: all 0.15s;
    }
    .confirm-btn.cancel {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }
    .confirm-btn.cancel:hover, .confirm-btn.cancel:active {
      border-color: var(--text);
      color: var(--text);
      background: rgba(232, 237, 245, 0.06);
    }
    .confirm-btn.confirm {
      border-color: var(--neon-red);
      color: var(--neon-red);
    }
    .confirm-btn.confirm:hover, .confirm-btn.confirm:active {
      background: var(--neon-red);
      color: var(--bg-deep);
      box-shadow: 0 0 24px rgba(255, 71, 87, 0.5);
    }
  </style>
</head>

  <div class="footer-hint">D · F · J · K</div>

  <script>
  // ============================================================
  // CONFIG
  // ============================================================
  const CONFIG = {
    lanes: 4,
    laneKeys: ['d', 'f', 'j', 'k'],
    fallTime: 1.1,
    windowPerfect: 0.045,
    windowGood:    0.090,
    windowOkay:    0.135,
    noteHeight: 22,
    hitLineY:   0.82,
    perfectScore: 100,
    goodScore:    60,
    okayScore:    30,
    // 音樂開始播放後等多少秒才出現第一顆音符 (給玩家先感受節奏)
    introDelay: 4.0,
  };

  const DIFFICULTY_PRESETS = {
    easy:   { fallTime: 1.4, windowPerfect: 0.060, windowGood: 0.110, windowOkay: 0.160 },
    normal: { fallTime: 1.1, windowPerfect: 0.045, windowGood: 0.090, windowOkay: 0.135 },
    hard:   { fallTime: 0.9, windowPerfect: 0.035, windowGood: 0.075, windowOkay: 0.115 },
    insane: { fallTime: 0.75, windowPerfect: 0.030, windowGood: 0.065, windowOkay: 0.100 },
  };

  // ============================================================
  // HIGH SCORES (localStorage)
  // ============================================================
  const Highscore = {
    key: 'neonbeat:highscores',
    load() {
      try { return JSON.parse(localStorage.getItem(this.key)) || {}; }
      catch (e) { return {}; }
    },
    get(songId, diff) {
      const all = this.load();
      return all[`${songId}:${diff}`] || 0;
    },
    set(songId, diff, score) {
      const all = this.load();
      const key = `${songId}:${diff}`;
      const existing = all[key] || 0;
      if (score > existing) {
        all[key] = score;
        try { localStorage.setItem(this.key, JSON.stringify(all)); } catch (e) {}
        return true; // new record
      }
      return false;
    },
  };

  // ============================================================
  // AUDIO ENGINE — Web Audio API
  // ============================================================
  class AudioEngine {
    constructor() {
      this.ctx = null;
      this.buffer = null;
      this.source = null;
      this.scheduledStart = 0;
    }
    async init() {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') await this.ctx.resume();
    }
    async loadFromUrl(url) {
      await this.init();
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Failed to fetch audio (${res.status})`);
      const arrayBuffer = await res.arrayBuffer();
      this.buffer = await this.ctx.decodeAudioData(arrayBuffer);
    }
    start(when) {
      this.stop();
      this.source = this.ctx.createBufferSource();
      this.source.buffer = this.buffer;
      this.source.connect(this.ctx.destination);
      this.source.start(when);
      this.scheduledStart = when;
    }
    stop() {
      if (this.source) {
        try { this.source.stop(); } catch (e) {}
        this.source.disconnect();
        this.source = null;
      }
    }
    getCurrentTime() { return this.ctx.currentTime - this.scheduledStart; }
    get audioTime() { return this.ctx.currentTime; }
    get duration()  { return this.buffer ? this.buffer.duration : 0; }
  }

  // ============================================================
  // PREVIEW PLAYER — 試聽：歌曲中段擷取 10 秒帶淡入淡出
  // ============================================================
  class PreviewPlayer {
    constructor(audioEngine) {
      this.engine = audioEngine; // 共用 AudioContext
      this.bufferCache = new Map(); // url → AudioBuffer (避免重複下載解碼)
      this.activeSource = null;
      this.activeGain = null;
      this.activeUrl = null;
      this.onEnd = null; // callback
    }

    async play(url, { duration = 10, fade = 1 } = {}) {
      // 確保 AudioContext 解鎖 (使用者點擊試聽是合法的解鎖時機)
      await this.engine.init();
      const ctx = this.engine.ctx;

      // 同一首再點 → 視為停止
      if (this.activeUrl === url && this.activeSource) {
        this.stop();
        return false;
      }

      // 先停止現有試聽
      this.stop();

      // 取得 buffer (有快取就用)
      let buffer = this.bufferCache.get(url);
      if (!buffer) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Preview fetch failed');
        const arrayBuffer = await res.arrayBuffer();
        buffer = await ctx.decodeAudioData(arrayBuffer);
        this.bufferCache.set(url, buffer);
      }

      // 試聽片段：從中間開始
      const clipDuration = Math.min(duration, buffer.duration);
      const fadeDur = Math.min(fade, clipDuration / 3);
      const startOffset = Math.max(0, buffer.duration / 2 - clipDuration / 2);

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const gain = ctx.createGain();
      source.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      // 淡入
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(1.0, now + fadeDur);
      // 維持
      gain.gain.setValueAtTime(1.0, now + clipDuration - fadeDur);
      // 淡出
      gain.gain.linearRampToValueAtTime(0, now + clipDuration);

      source.start(now, startOffset, clipDuration);
      this.activeSource = source;
      this.activeGain = gain;
      this.activeUrl = url;

      source.onended = () => {
        if (this.activeSource === source) {
          this.activeSource = null;
          this.activeGain = null;
          const ended = this.activeUrl;
          this.activeUrl = null;
          if (this.onEnd) this.onEnd(ended);
        }
      };
      return true;
    }

    stop() {
      if (this.activeSource && this.activeGain) {
        const ctx = this.engine.ctx;
        const now = ctx.currentTime;
        const src = this.activeSource;
        const g = this.activeGain;
        try {
          // 短暫淡出避免爆音
          g.gain.cancelScheduledValues(now);
          g.gain.setValueAtTime(g.gain.value, now);
          g.gain.linearRampToValueAtTime(0, now + 0.06);
          setTimeout(() => {
            try { src.stop(); src.disconnect(); g.disconnect(); } catch (e) {}
          }, 80);
        } catch (e) {}
        this.activeSource = null;
        this.activeGain = null;
        const ended = this.activeUrl;
        this.activeUrl = null;
        if (this.onEnd) this.onEnd(ended);
      }
    }

    isPlaying(url) {
      return this.activeUrl === url && this.activeSource !== null;
    }
  }

  // ============================================================
  // PARTICLE & JUDGMENT
  // ============================================================
  class Particle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 9;
      this.vy = -2 - Math.random() * 6;
      this.life = 1;
      this.color = color;
      this.size = 2 + Math.random() * 3;
    }
    update(dt) { this.x += this.vx; this.y += this.vy; this.vy += 0.55; this.vx *= 0.97; this.life -= dt * 1.6; }
    draw(ctx) {
      if (this.life <= 0) return;
      ctx.save(); ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color; ctx.shadowBlur = 14; ctx.shadowColor = this.color;
      ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
      ctx.restore();
    }
  }
  class Judgment {
    constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1; this.maxLife = 0.7; }
    update(dt) { this.life -= dt / this.maxLife; this.y -= 32 * dt; }
    draw(ctx) {
      if (this.life <= 0) return;
      ctx.save(); ctx.globalAlpha = Math.min(1, this.life * 1.5);
      ctx.fillStyle = this.color; ctx.shadowBlur = 18; ctx.shadowColor = this.color;
      ctx.font = 'bold 20px Orbitron, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(this.text, this.x, this.y); ctx.restore();
    }
  }

  // ============================================================
  // GAME
  // ============================================================
  class Game {
    constructor() {
      this.canvas = document.getElementById('game-canvas');
      this.ctx2d = this.canvas.getContext('2d');
      this.audio = new AudioEngine();
      this.notes = [];
      this.particles = [];
      this.judgments = [];
      this.score = 0; this.combo = 0; this.maxCombo = 0;
      this.totalNotes = 0;
      this.stats = { perfect: 0, good: 0, okay: 0, miss: 0 };
      this.pressedLanes = [false, false, false, false];
      this.laneFlash = [0, 0, 0, 0];
      this.holdingNote = [null, null, null, null]; // 每軌目前正在按住的長按音符
      this.touchToLane = new Map();
      this.running = false;
      this.paused = false;
      this.lastFrameTime = 0;
      this.endTime = 0;
      this.currentSong = null;
      this.currentDifficulty = 'normal';
      this.onEnd = null;
      this.resize();
      window.addEventListener('resize', () => this.resize());
      this.bindInput();
    }
    resize() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.min(window.innerWidth, 540);
      const h = window.innerHeight;
      this.canvas.width = w * dpr; this.canvas.height = h * dpr;
      this.canvas.style.width = w + 'px'; this.canvas.style.height = h + 'px';
      this.ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
      this.viewW = w; this.viewH = h;
      this.laneWidth = w / CONFIG.lanes;
      this.hitY = h * CONFIG.hitLineY;
      this.spawnY = -CONFIG.noteHeight;
    }
    bindInput() {
      document.addEventListener('keydown', e => {
        if (!this.running || e.repeat) return;
        const lane = CONFIG.laneKeys.indexOf(e.key.toLowerCase());
        if (lane !== -1 && !this.pressedLanes[lane]) {
          this.pressedLanes[lane] = true; this.laneFlash[lane] = 1;
          this.handleHit(lane);
        }
      });
      document.addEventListener('keyup', e => {
        const lane = CONFIG.laneKeys.indexOf(e.key.toLowerCase());
        if (lane !== -1 && this.pressedLanes[lane]) {
          this.pressedLanes[lane] = false;
          this.handleRelease(lane);
        }
      });
      const touchHandler = (e, isStart) => {
        if (!this.running) return;
        e.preventDefault();
        const rect = this.canvas.getBoundingClientRect();
        for (const t of e.changedTouches) {
          const x = t.clientX - rect.left;
          const lane = Math.floor(x / this.laneWidth);
          if (lane < 0 || lane >= CONFIG.lanes) continue;
          if (isStart) {
            this.touchToLane.set(t.identifier, lane);
            if (!this.pressedLanes[lane]) {
              this.pressedLanes[lane] = true; this.laneFlash[lane] = 1;
              this.handleHit(lane);
            }
          } else {
            const released = this.touchToLane.get(t.identifier);
            if (released !== undefined) {
              this.touchToLane.delete(t.identifier);
              const stillHeld = [...this.touchToLane.values()].includes(released);
              if (!stillHeld) {
                this.pressedLanes[released] = false;
                this.handleRelease(released);
              }
            }
          }
        }
      };
      this.canvas.addEventListener('touchstart',  e => touchHandler(e, true),  { passive: false });
      this.canvas.addEventListener('touchend',    e => touchHandler(e, false), { passive: false });
      this.canvas.addEventListener('touchcancel', e => touchHandler(e, false), { passive: false });
    }

    setDifficulty(diff) {
      this.currentDifficulty = diff;
      Object.assign(CONFIG, DIFFICULTY_PRESETS[diff]);
    }

    async loadSong(songMeta) {
      this.currentSong = songMeta;
      const folder = `songs/${songMeta.id}/`;
      const bust = `?v=${Date.now()}`;
      const [chartRes, _] = await Promise.all([
        fetch(folder + 'charts.json' + bust, { cache: 'no-store' }).then(r => r.json()),
        // 音檔不加 bust，因為大檔不常變動，讓快取保留可加快重複播放
        this.audio.loadFromUrl(folder + songMeta.audio),
      ]);
      this.allCharts = chartRes.charts;
    }

    async start(diff) {
      this.setDifficulty(diff);
      const rawNotes = this.allCharts[diff];
      // 過濾掉太早的音符 (introDelay 秒前的)，讓玩家先聽幾秒音樂
      this.notes = rawNotes
        .filter(n => n.time >= CONFIG.introDelay)
        .map((n, i) => ({
          id: i,
          time: n.time,
          lane: n.lane,
          duration: n.duration || 0,  // 0 = tap, >0 = hold
          hit: false,
          missed: false,
          holding: false,
          completed: false,  // hold 完成標記
        }));
      this.totalNotes = this.notes.length;
      this.particles = []; this.judgments = [];
      this.score = 0; this.combo = 0; this.maxCombo = 0;
      this.stats = { perfect: 0, good: 0, okay: 0, miss: 0 };
      this.holdingNote = [null, null, null, null];
      this.paused = false;

      if (this.audio.ctx.state === 'suspended') await this.audio.ctx.resume();
      // introDelay 已涵蓋緩衝時間，只需要極短的 audio 啟動延遲
      const leadIn = 0.3;
      const audioStart = this.audio.audioTime + leadIn;
      this.audio.start(audioStart);

      this.endTime = this.audio.duration + 1.2;
      this.running = true;
      this.lastFrameTime = performance.now();
      requestAnimationFrame(t => this.loop(t));
    }

    abort() {
      this.running = false;
      this.paused = false;
      this.audio.stop();
    }

    pause() {
      if (!this.running || this.paused) return;
      this.paused = true;
      // 暫停 AudioContext 讓音樂跟邏輯時間都停下來
      if (this.audio.ctx && this.audio.ctx.state === 'running') {
        this.audio.ctx.suspend();
      }
    }

    resume() {
      if (!this.running || !this.paused) return;
      this.paused = false;
      this.lastFrameTime = performance.now();  // 避免 dt 暴衝
      if (this.audio.ctx && this.audio.ctx.state === 'suspended') {
        this.audio.ctx.resume();
      }
    }

    loop(timestamp) {
      if (!this.running) return;
      if (this.paused) {
        // 暫停中：保持 draw (顯示凍結畫面) 但不 update
        this.draw();
        requestAnimationFrame(t => this.loop(t));
        return;
      }
      const dt = Math.min((timestamp - this.lastFrameTime) / 1000, 0.05);
      this.lastFrameTime = timestamp;
      this.update(dt); this.draw();
      if (this.audio.getCurrentTime() < this.endTime) requestAnimationFrame(t => this.loop(t));
      else this.end();
    }
    update(dt) {
      const t = this.audio.getCurrentTime();
      // 一般 miss 偵測：超過判定窗還沒被擊中
      for (const note of this.notes) {
        if (note.hit || note.missed) continue;
        if (t - note.time > CONFIG.windowOkay) {
          note.missed = true;
          this.recordJudgment('miss', note.lane);
        }
      }
      // 長按完成偵測：如果某軌正在按住的長按，時間已到結尾，視為成功完成
      for (let lane = 0; lane < CONFIG.lanes; lane++) {
        const note = this.holdingNote[lane];
        if (!note) continue;
        const endTime = note.time + note.duration;
        if (t >= endTime - 0.05) {
          // 完成長按 → 給予獎勵
          note.completed = true;
          note.holding = false;
          this.holdingNote[lane] = null;
          const bonus = Math.floor(50 + note.duration * 50);
          this.score += bonus * (1 + this.combo * 0.005);
          this.combo++;
          this.maxCombo = Math.max(this.maxCombo, this.combo);
          const x = lane * this.laneWidth + this.laneWidth / 2;
          for (let i = 0; i < 14; i++) {
            this.particles.push(new Particle(x, this.hitY, '#ffd700'));
          }
          this.judgments.push(new Judgment(x, this.hitY - 56, 'HOLD!', '#ffd700'));
        }
      }
      for (const p of this.particles) p.update(dt);
      this.particles = this.particles.filter(p => p.life > 0);
      for (const j of this.judgments) j.update(dt);
      this.judgments = this.judgments.filter(j => j.life > 0);
      for (let i = 0; i < CONFIG.lanes; i++) this.laneFlash[i] = Math.max(0, this.laneFlash[i] - dt * 4);
      this.updateHUD();
    }
    draw() {
      const ctx = this.ctx2d, w = this.viewW, h = this.viewH;
      ctx.fillStyle = '#050810'; ctx.fillRect(0, 0, w, h);
      for (let i = 0; i < CONFIG.lanes; i++) {
        const x = i * this.laneWidth;
        const grad = ctx.createLinearGradient(x, 0, x, h);
        grad.addColorStop(0, 'rgba(20, 25, 40, 0.25)');
        grad.addColorStop(1, 'rgba(20, 25, 40, 0)');
        ctx.fillStyle = grad; ctx.fillRect(x, 0, this.laneWidth, h);
        if (this.laneFlash[i] > 0 || this.pressedLanes[i]) {
          const intensity = this.pressedLanes[i] ? 1 : this.laneFlash[i];
          const color = (i === 1 || i === 2) ? '255, 46, 159' : '0, 234, 255';
          const fg = ctx.createLinearGradient(x, this.hitY - 240, x, this.hitY);
          fg.addColorStop(0, `rgba(${color}, 0)`);
          fg.addColorStop(1, `rgba(${color}, ${0.32 * intensity})`);
          ctx.fillStyle = fg; ctx.fillRect(x, this.hitY - 240, this.laneWidth, 240);
        }
      }
      ctx.strokeStyle = 'rgba(0, 234, 255, 0.18)'; ctx.lineWidth = 1;
      for (let i = 0; i <= CONFIG.lanes; i++) {
        ctx.beginPath(); ctx.moveTo(i * this.laneWidth, 0); ctx.lineTo(i * this.laneWidth, h); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255, 46, 159, 0.75)'; ctx.lineWidth = 3;
      ctx.shadowBlur = 22; ctx.shadowColor = '#ff2e9f';
      ctx.beginPath(); ctx.moveTo(0, this.hitY); ctx.lineTo(w, this.hitY); ctx.stroke();
      ctx.shadowBlur = 0;
      for (let i = 0; i < CONFIG.lanes; i++) {
        const x = i * this.laneWidth, pressed = this.pressedLanes[i];
        ctx.strokeStyle = pressed ? '#00eaff' : 'rgba(107, 122, 144, 0.4)';
        ctx.lineWidth = pressed ? 2 : 1;
        ctx.strokeRect(x + 4, this.hitY + 8, this.laneWidth - 8, 56);
        ctx.fillStyle = pressed ? '#00eaff' : 'rgba(107, 122, 144, 0.6)';
        ctx.font = 'bold 16px Orbitron, sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(CONFIG.laneKeys[i].toUpperCase(), x + this.laneWidth / 2, this.hitY + 42);
      }
      const t = this.audio.getCurrentTime();

      // 1. 先畫長按拖尾 (在頭部下面層)
      for (const note of this.notes) {
        if (note.duration <= 0) continue;
        if (note.completed) continue;
        if (note.missed) continue;
        const noteEndTime = note.time + note.duration;
        const tuHead = note.time - t;
        const tuTail = noteEndTime - t;
        const isActiveHold = note.hit && note.holding;

        // 可見性檢查 (active hold 時永遠畫，因為頭部釘在判定線)
        if (!isActiveHold) {
          if (tuHead > CONFIG.fallTime) continue;       // 頭部還沒進入畫面
          if (tuTail < -CONFIG.windowOkay - 0.2) continue; // 整條已通過
        } else {
          if (tuTail < -0.05) continue; // active hold 但拖尾完全結束
        }

        // 計算 head 與 tail tip 的螢幕 y
        let headProg = 1 - (tuHead / CONFIG.fallTime);
        let tailProg = 1 - (tuTail / CONFIG.fallTime);
        let headY = this.spawnY + (this.hitY - this.spawnY) * headProg;
        const tailY = this.spawnY + (this.hitY - this.spawnY) * tailProg;

        // 如果頭已被按下並且仍在按住中，頭部停在判定線
        if (isActiveHold) headY = this.hitY;

        const x = note.lane * this.laneWidth;
        const color = (note.lane === 1 || note.lane === 2) ? '#ff2e9f' : '#00eaff';
        const padding = 14;
        const tailX = x + padding;
        const tailW = this.laneWidth - padding * 2;

        // 畫拖尾 (tail tip 在上、head 在下)
        const top = Math.min(tailY, headY);
        const bot = Math.max(tailY, headY);
        if (bot - top > 1) {
          ctx.save();
          ctx.globalAlpha = isActiveHold ? 0.55 : 0.32;
          const grad = ctx.createLinearGradient(0, top, 0, bot);
          grad.addColorStop(0, color + '00');  // 上端漸透明
          grad.addColorStop(0.25, color + '88');
          grad.addColorStop(1, color + 'cc');
          ctx.fillStyle = grad;
          ctx.shadowBlur = isActiveHold ? 12 : 6;
          ctx.shadowColor = color;
          ctx.fillRect(tailX, top, tailW, bot - top);
          // 中間發光細線 (active 時更亮，但比之前淡)
          if (isActiveHold) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.shadowBlur = 0;
            ctx.fillRect(tailX + tailW / 2 - 1, top, 2, bot - top);
          }
          ctx.restore();
        }
      }

      // 2. 畫一般音符的頭 (tap 與 hold 共用)
      for (const note of this.notes) {
        if (note.hit && note.duration <= 0) continue;     // tap 命中後不再畫
        if (note.completed) continue;                      // hold 完成後不畫
        if (note.missed) continue;
        const tu = note.time - t;
        if (tu > CONFIG.fallTime) continue;
        if (note.duration <= 0 && tu < -CONFIG.windowOkay) continue;

        let progress = 1 - (tu / CONFIG.fallTime);
        let y = this.spawnY + (this.hitY - this.spawnY) * progress;
        // 長按按住中時，頭部停在判定線上發光
        if (note.hit && note.holding) y = this.hitY;

        const x = note.lane * this.laneWidth;
        const color = (note.lane === 1 || note.lane === 2) ? '#ff2e9f' : '#00eaff';
        ctx.save();
        ctx.shadowBlur = note.holding ? 28 : 18;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        const padding = 10, noteX = x + padding, noteW = this.laneWidth - padding * 2, noteH = CONFIG.noteHeight;
        this.roundRect(ctx, noteX, y - noteH / 2, noteW, noteH, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
        ctx.fillRect(noteX + 3, y - noteH / 2 + 3, noteW - 6, 2);
        ctx.restore();
      }
      for (const p of this.particles) p.draw(ctx);
      for (const j of this.judgments) j.draw(ctx);

      // Intro countdown overlay - 在第一顆音符出現前顯示提示
      const elapsed = this.audio.getCurrentTime();
      if (elapsed < CONFIG.introDelay && elapsed > -1) {
        const remaining = CONFIG.introDelay - elapsed;
        ctx.save();
        ctx.textAlign = 'center';

        if (remaining > 3) {
          // 早期：GET READY 訊息
          const opacity = Math.min(1, (CONFIG.introDelay - remaining) / 0.6);
          ctx.globalAlpha = opacity;
          ctx.fillStyle = '#00eaff';
          ctx.shadowBlur = 24;
          ctx.shadowColor = '#00eaff';
          ctx.font = 'bold 32px Orbitron, sans-serif';
          ctx.fillText('GET READY', w / 2, h * 0.42);

          ctx.font = '11px JetBrains Mono, monospace';
          ctx.globalAlpha = opacity * 0.7;
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#6b7a90';
          ctx.fillText('感受節奏', w / 2, h * 0.46);
        } else if (remaining > 0) {
          // 倒數 3-2-1：每秒一個大數字，會放大淡出
          const num = Math.max(1, Math.ceil(remaining));
          const fracInSec = num - remaining; // 0 到 1，秒內的進度
          const scale = 1 + fracInSec * 0.4;
          const alpha = 1 - fracInSec * 0.85;

          ctx.globalAlpha = alpha;
          ctx.fillStyle = num === 1 ? '#ff2e9f' : '#00eaff';
          ctx.shadowBlur = 40;
          ctx.shadowColor = ctx.fillStyle;
          ctx.font = `bold ${Math.floor(110 * scale)}px Orbitron, sans-serif`;
          ctx.fillText(String(num), w / 2, h * 0.5);
        }
        ctx.restore();
      }
    }
    roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath(); ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
    }
    handleHit(lane) {
      const t = this.audio.getCurrentTime();
      // 「消除窗」比 okay window 大 70ms，讓太早/太晚的按鍵也能消耗對應音符 (避免雙重 miss)
      const consumeWindow = CONFIG.windowOkay + 0.07;

      let closestNote = null;
      let closestDelta = Infinity;
      for (const note of this.notes) {
        if (note.hit || note.missed || note.lane !== lane) continue;
        const delta = note.time - t;
        if (Math.abs(delta) < Math.abs(closestDelta) && Math.abs(delta) <= consumeWindow) {
          closestDelta = delta;
          closestNote = note;
        }
      }

      if (closestNote) {
        const absDelta = Math.abs(closestDelta);
        if (absDelta <= CONFIG.windowOkay) {
          // 在判定窗內 → 命中
          closestNote.hit = true;
          const j = absDelta <= CONFIG.windowPerfect ? 'perfect'
                  : absDelta <= CONFIG.windowGood    ? 'good'
                                                    : 'okay';
          this.recordJudgment(j, lane);
          // 如果是長按音符，開始追蹤按住狀態
          if (closestNote.duration > 0) {
            this.holdingNote[lane] = closestNote;
            closestNote.holding = true;
          }
        } else {
          // 太早/太晚但在消除窗內 → 消耗該音符並判 miss
          closestNote.missed = true;
          this.recordJudgment('miss', lane);
        }
      } else {
        // 附近沒有音符 → 空按 miss
        this.recordJudgment('miss', lane);
      }
    }

    handleRelease(lane) {
      // 如果該軌正在按住長按音符
      const note = this.holdingNote[lane];
      if (!note) return;
      const t = this.audio.getCurrentTime();
      const endTime = note.time + note.duration;

      this.holdingNote[lane] = null;
      note.holding = false;

      if (note.completed) return;
      note.completed = true;  // 標記結束 (視覺停止顯示拖尾)

      // 計算「按住的比例」 — 0 (剛按就放) 到 1 (完整按完)
      const heldDuration = Math.max(0, t - note.time);
      const ratio = Math.min(1, heldDuration / note.duration);

      // 分數依比例給：完整 100% 拿到 50 + duration*50；中途放比例縮減
      const fullBonus = Math.floor(50 + note.duration * 50);
      const earnedBonus = Math.floor(fullBonus * ratio);
      this.score += earnedBonus * (1 + this.combo * 0.005);

      const x = lane * this.laneWidth + this.laneWidth / 2;
      if (ratio >= 0.95) {
        // 接近完整 → HOLD! 大字 + combo +1 + 金粒子
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
        for (let i = 0; i < 14; i++) {
          this.particles.push(new Particle(x, this.hitY, '#ffd700'));
        }
        this.judgments.push(new Judgment(x, this.hitY - 56, 'HOLD!', '#ffd700'));
      } else if (ratio >= 0.4) {
        // 中段放開 → 綠色粒子，無大字提示，不斷 combo
        for (let i = 0; i < 8; i++) {
          this.particles.push(new Particle(x, this.hitY, '#4ade80'));
        }
      }
      // 立刻放開 (<40%): 沒有任何 miss 或斷 combo，純粹少拿分而已
    }
    recordJudgment(type, lane) {
      this.stats[type]++;
      const colors = { perfect: '#ffd700', good: '#4ade80', okay: '#00eaff', miss: '#ff4757' };
      const labels = { perfect: 'PERFECT', good: 'GOOD', okay: 'OKAY', miss: 'MISS' };
      if (type === 'miss') { this.combo = 0; }
      else {
        this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo);
        const pts = type === 'perfect' ? CONFIG.perfectScore : type === 'good' ? CONFIG.goodScore : CONFIG.okayScore;
        this.score += Math.floor(pts * (1 + this.combo * 0.005));
        const x = lane * this.laneWidth + this.laneWidth / 2, y = this.hitY;
        const count = type === 'perfect' ? 18 : type === 'good' ? 12 : 7;
        for (let i = 0; i < count; i++) this.particles.push(new Particle(x, y, colors[type]));
      }
      const x = lane * this.laneWidth + this.laneWidth / 2;
      this.judgments.push(new Judgment(x, this.hitY - 56, labels[type], colors[type]));
    }
    updateHUD() {
      document.querySelector('#score-display .hud-value').textContent =
        String(Math.floor(this.score)).padStart(6, '0');
      const c = document.getElementById('combo-display');
      c.querySelector('.hud-value').textContent = this.combo;
      c.classList.toggle('zero', this.combo === 0);
      const total = this.stats.perfect + this.stats.good + this.stats.okay + this.stats.miss;
      let acc = 100;
      if (total > 0) {
        const w = this.stats.perfect * 1 + this.stats.good * 0.7 + this.stats.okay * 0.4;
        acc = (w / total) * 100;
      }
      document.querySelector('#accuracy-display .hud-value').textContent = acc.toFixed(2) + '%';
    }
    end() {
      this.running = false;
      this.audio.stop();
      const total = this.totalNotes;
      const w = this.stats.perfect * 1 + this.stats.good * 0.7 + this.stats.okay * 0.4;
      const acc = total > 0 ? (w / total) * 100 : 0;
      let grade = 'F';
      if (acc >= 95) grade = 'S';
      else if (acc >= 88) grade = 'A';
      else if (acc >= 78) grade = 'B';
      else if (acc >= 65) grade = 'C';
      else if (acc >= 50) grade = 'D';
      const isNewRecord = Highscore.set(this.currentSong.id, this.currentDifficulty, Math.floor(this.score));
      if (this.onEnd) this.onEnd({
        grade, score: Math.floor(this.score), stats: { ...this.stats },
        maxCombo: this.maxCombo,
        difficulty: this.currentDifficulty, isNewRecord, song: this.currentSong,
      });
    }
  }

  // ============================================================
  // APP — 主控狀態機
  // ============================================================
  class App {
    constructor() {
      this.songs = [];
      this.currentSong = null;
      this.selectedDifficulty = 'normal';
      this.game = new Game();
      this.game.onEnd = (result) => this.showResults(result);
      this.preview = new PreviewPlayer(this.game.audio);
      this.preview.onEnd = (url) => this.refreshPreviewButtons(url);

      this.menuEl    = document.getElementById('menu-screen');
      this.detailEl  = document.getElementById('detail-screen');
      this.resultsEl = document.getElementById('results-screen');

      this.bindUI();
    }

    async init() {
      // 加上 cache-busting 字串，避免 iOS WKWebView 給舊版 JSON
      const bust = `?v=${Date.now()}`;
      try {
        const res = await fetch('songs/index.json' + bust, { cache: 'no-store' });
        if (!res.ok) throw new Error('index.json not found');
        const data = await res.json();
        const songsFromIndex = data.songs || [];

        // 從每首歌獨立的 meta.json 讀取最新資料 (這樣只要改 meta.json 就會反映)
        const fullMetas = await Promise.all(
          songsFromIndex.map(async (entry) => {
            try {
              const r = await fetch(`songs/${entry.id}/meta.json` + bust, { cache: 'no-store' });
              if (!r.ok) throw new Error(`meta ${entry.id} status ${r.status}`);
              const meta = await r.json();
              // 合併 index 的資料當 fallback (避免 meta 缺欄位)
              return { ...entry, ...meta };
            } catch (e) {
              console.warn(`Could not load meta for ${entry.id}, using index data:`, e.message);
              return entry;
            }
          })
        );
        this.songs = fullMetas;
        // 依標題排序 (跟 index.json 一致)
        this.songs.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      } catch (e) {
        console.warn('Could not load songs/index.json:', e.message);
        this.songs = [];
      }
      this.renderSongList();
    }

    renderSongList() {
      const container = document.getElementById('song-list');
      container.innerHTML = '';

      if (this.songs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            No songs found.<br><br>
            Add one with:
            <code>python3 tools/add_song.py path/to/song.mp3 --title "Title" --artist "Artist"</code>
            Then make sure you're serving via:
            <code>python3 -m http.server 8000</code>
          </div>
        `;
        return;
      }

      for (const song of this.songs) {
        const card = document.createElement('div');
        card.className = 'song-card';
        const dur = `${Math.floor(song.duration / 60)}:${String(Math.floor(song.duration % 60)).padStart(2, '0')}`;
        const bpm = Math.round(song.bpm);

        // Build cover gradient deterministically from id
        const hash = [...song.id].reduce((a, c) => (a * 31 + c.charCodeAt(0)) >>> 0, 7);
        const hue1 = hash % 360, hue2 = (hue1 + 60 + (hash >> 4) % 120) % 360;
        const cover = `linear-gradient(135deg, hsl(${hue1}, 75%, 55%), hsl(${hue2}, 75%, 45%))`;

        const easyHi   = Highscore.get(song.id, 'easy');
        const normalHi = Highscore.get(song.id, 'normal');
        const hardHi   = Highscore.get(song.id, 'hard');
        const insaneHi = Highscore.get(song.id, 'insane');
        const fmtScore = s => s ? String(s).padStart(6, '0') : '------';

        const audioUrl = `songs/${song.id}/${song.audio}`;
        const isPlaying = this.preview.isPlaying(audioUrl);

        card.innerHTML = `
          <div class="cover" style="background: ${cover}">
            ${song.youtube ? `
              <a class="yt-link" href="${song.youtube}" target="_blank" rel="noopener noreferrer" title="在 YouTube 上觀看">
                <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                  <polygon points="8,5 8,19 19,12" fill="white"/>
                </svg>
              </a>
            ` : ''}
          </div>
          <div class="info">
            <div class="name">${song.title}</div>
            <div class="artist">${song.artist || 'Unknown'}</div>
            <div class="meta">${bpm} BPM · ${dur}</div>
            <div class="high-scores">
              <div class="high-score easy"><span class="label">E</span><span class="v">${fmtScore(easyHi)}</span></div>
              <div class="high-score normal"><span class="label">N</span><span class="v">${fmtScore(normalHi)}</span></div>
              <div class="high-score hard"><span class="label">H</span><span class="v">${fmtScore(hardHi)}</span></div>
              <div class="high-score insane"><span class="label">I</span><span class="v">${fmtScore(insaneHi)}</span></div>
            </div>
            <div class="actions">
              <button class="action-btn preview ${isPlaying ? 'playing' : ''}" data-action="preview" data-song-id="${song.id}">
                ${isPlaying ? '■ 停止' : '▶ 試聽'}
              </button>
              <button class="action-btn start" data-action="start" data-song-id="${song.id}">
                開始
              </button>
            </div>
          </div>
        `;

        // 為按鈕綁事件 (避免冒泡到 card)
        card.querySelector('[data-action="preview"]').addEventListener('click', (e) => {
          e.stopPropagation();
          this.togglePreview(song);
        });
        card.querySelector('[data-action="start"]').addEventListener('click', (e) => {
          e.stopPropagation();
          this.preview.stop();
          this.selectSong(song);
        });
        // YouTube 連結：阻止冒泡 (avoid 觸發 card click)
        const ytLink = card.querySelector('.yt-link');
        if (ytLink) {
          ytLink.addEventListener('click', (e) => e.stopPropagation());
        }
        // 點卡片本體（不在按鈕/連結上時）也進入難度頁
        card.addEventListener('click', (e) => {
          if (e.target.closest('.action-btn')) return;
          if (e.target.closest('.yt-link')) return;
          this.preview.stop();
          this.selectSong(song);
        });
        container.appendChild(card);
      }
    }

    async togglePreview(song) {
      const url = `songs/${song.id}/${song.audio}`;
      try {
        await this.preview.play(url);
      } catch (e) {
        console.warn('Preview error:', e);
      }
      this.refreshPreviewButtons();
    }

    refreshPreviewButtons() {
      // 更新所有 preview button 的狀態 (不重畫整個列表)
      const allBtns = document.querySelectorAll('.song-card .action-btn.preview');
      allBtns.forEach(btn => {
        const songId = btn.dataset.songId;
        const song = this.songs.find(s => s.id === songId);
        if (!song) return;
        const url = `songs/${song.id}/${song.audio}`;
        const playing = this.preview.isPlaying(url);
        btn.classList.toggle('playing', playing);
        btn.innerHTML = playing ? '■ 停止' : '▶ 試聽';
      });
    }

    bindUI() {
      document.getElementById('back-btn').addEventListener('click', () => this.showMenu());
      document.getElementById('results-back-btn').addEventListener('click', () => this.showMenu());

      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          this.selectedDifficulty = btn.dataset.diff;
        });
      });

      document.getElementById('start-btn').addEventListener('click', async () => {
        this.preview.stop();
        document.getElementById('detail-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('game-exit-btn').classList.remove('hidden');
        await this.game.start(this.selectedDifficulty);
      });

      document.getElementById('retry-btn').addEventListener('click', async () => {
        this.preview.stop();
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('game-exit-btn').classList.remove('hidden');
        await this.game.start(this.selectedDifficulty);
      });

      // 遊玩中的退出按鈕 → 顯示確認對話框 + 暫停遊戲
      document.getElementById('game-exit-btn').addEventListener('click', () => {
        this.game.pause();
        document.getElementById('exit-confirm-modal').classList.remove('hidden');
      });
      // 取消 → 關閉對話框，恢復遊戲
      document.getElementById('exit-cancel-btn').addEventListener('click', () => {
        document.getElementById('exit-confirm-modal').classList.add('hidden');
        this.game.resume();
      });
      // 確認退出
      document.getElementById('exit-confirm-btn').addEventListener('click', () => {
        document.getElementById('exit-confirm-modal').classList.add('hidden');
        this.exitGame();
      });
    }

    exitGame() {
      this.game.abort();
      document.getElementById('game-exit-btn').classList.add('hidden');
      document.getElementById('results-screen').classList.add('hidden');
      // 回到該歌的難度選擇頁
      if (this.currentSong) {
        document.getElementById('detail-screen').classList.remove('hidden');
      } else {
        document.getElementById('menu-screen').classList.remove('hidden');
      }
    }

    async selectSong(song) {
      this.currentSong = song;
      document.getElementById('menu-screen').classList.add('hidden');
      document.getElementById('detail-screen').classList.remove('hidden');
      document.getElementById('detail-name').textContent = song.title;
      const dur = `${Math.floor(song.duration / 60)}:${String(Math.floor(song.duration % 60)).padStart(2, '0')}`;
      document.getElementById('detail-meta').textContent = `${song.artist || 'Unknown'} · ${Math.round(song.bpm)} BPM · ${dur}`;

      // 還原預選的難度視覺
      document.querySelectorAll('.diff-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.diff === this.selectedDifficulty);
      });

      // 載入 + 顯示三難度音符數
      const startBtn = document.getElementById('start-btn');
      const loadingEl = document.getElementById('loading-text');
      startBtn.disabled = true;
      startBtn.textContent = 'Loading';
      loadingEl.textContent = 'Loading audio…';
      try {
        await this.game.loadSong(song);
        for (const diff of ['easy', 'normal', 'hard', 'insane']) {
          const notes = this.game.allCharts[diff];
          if (!notes) {
            // 譜面尚未支援此難度 (舊歌)
            document.getElementById(`meta-${diff}`).textContent = '— (chart not available)';
            const btn = document.querySelector(`.diff-btn[data-diff="${diff}"]`);
            if (btn) btn.disabled = true;
            continue;
          }
          const btn = document.querySelector(`.diff-btn[data-diff="${diff}"]`);
          if (btn) btn.disabled = false;
          const nps = (notes.length / song.duration).toFixed(1);
          const hi = Highscore.get(song.id, diff);
          const hiText = hi ? `· best ${String(hi).padStart(6,'0')}` : '';
          document.getElementById(`meta-${diff}`).textContent = `${notes.length} notes · ${nps}/s ${hiText}`;
        }
        // 如果目前選的難度這首歌沒有，退回 normal
        if (!this.game.allCharts[this.selectedDifficulty]) {
          this.selectedDifficulty = 'normal';
          document.querySelectorAll('.diff-btn').forEach(b => {
            b.classList.toggle('selected', b.dataset.diff === 'normal');
          });
        }
        startBtn.disabled = false;
        startBtn.textContent = 'Start';
        loadingEl.textContent = '';
      } catch (e) {
        loadingEl.textContent = 'Error: ' + e.message;
      }
    }

    showMenu() {
      this.game.abort();
      document.getElementById('menu-screen').classList.remove('hidden');
      document.getElementById('detail-screen').classList.add('hidden');
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('game-exit-btn').classList.add('hidden');
      this.renderSongList(); // refresh high scores
    }

    showResults(r) {
      // 遊戲結束 → 隱藏退出按鈕
      document.getElementById('game-exit-btn').classList.add('hidden');
      const dn = r.difficulty.charAt(0).toUpperCase() + r.difficulty.slice(1);
      document.getElementById('results-diff-label').textContent = `${r.song.title} · ${dn}`;
      document.getElementById('grade').textContent = r.grade;
      document.getElementById('final-score').textContent = String(r.score).padStart(6, '0');
      document.getElementById('new-record').classList.toggle('hidden', !r.isNewRecord);
      document.getElementById('max-combo-value').textContent = r.maxCombo || 0;
      document.getElementById('stat-perfect').textContent = r.stats.perfect;
      document.getElementById('stat-good').textContent = r.stats.good;
      document.getElementById('stat-okay').textContent = r.stats.okay;
      document.getElementById('stat-miss').textContent = r.stats.miss;

      // Perfect / Full Combo 徽章
      const badge = document.getElementById('results-perfect-badge');
      const allPerfect = r.stats.perfect > 0
                      && r.stats.good === 0
                      && r.stats.okay === 0
                      && r.stats.miss === 0;
      const fullCombo = !allPerfect
                      && r.stats.miss === 0
                      && (r.stats.perfect + r.stats.good + r.stats.okay) > 0;
      badge.classList.remove('full-combo');
      if (allPerfect) {
        badge.textContent = 'ALL PERFECT';
        badge.classList.remove('hidden');
      } else if (fullCombo) {
        badge.textContent = 'FULL COMBO';
        badge.classList.add('full-combo');
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      document.getElementById('results-screen').classList.remove('hidden');
    }
  }

  // ============================================================
  // BOOT
  // ============================================================
  const app = new App();
  app.init();
  // 解鎖 AudioContext (iOS 安全策略需要)
  const unlock = () => {
    app.game.audio.init();
    document.removeEventListener('click', unlock);
    document.removeEventListener('touchstart', unlock);
  };
  document.addEventListener('click', unlock);
  document.addEventListener('touchstart', unlock);
  </script>
</body>
</html>
