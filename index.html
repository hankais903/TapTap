<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- 對抗 iOS WKWebView 快取，桌面 app 才會抓最新版 -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- iOS 桌面 app 設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NEON BEAT" />
  <meta name="theme-color" content="#050810" />

  <title>NEON BEAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ============================================
       馬卡龍主題 - 設計系統 (深淺切換)
       ============================================ */
    :root {
      /* 預設淺色主題 (奶油杏黃) */
      --bg:           #fff5e1;     /* 主背景 (奶油黃) */
      --surface:      #ffffff;     /* 卡片背景 */
      --surface-2:    #fef0d4;     /* 較深的卡片 */

      --text:         #5a3818;     /* 主文字 (深咖啡) */
      --text-soft:    #8a5a30;     /* 輔助文字 */
      --text-dim:     #c4a37c;     /* 暗淡文字 */

      --primary:      #ffafcc;     /* 主色 (桃粉) */
      --primary-dark: #6b1e3a;     /* 桃粉文字色 */
      --secondary:    #ffd6a5;     /* 副色 (杏黃) */
      --secondary-dark:#8a4a1a;    /* 杏黃文字色 */

      --accent-pink:  #ffc8dd;     /* 粉 */
      --accent-blue:  #bde0fe;     /* 藍 */
      --accent-green: #d8f3dc;     /* 綠 */
      --accent-coral: #ffadad;     /* 珊瑚 */

      --pink-text:    #8a3a5b;
      --blue-text:    #2c5d8a;
      --green-text:   #2d6a4f;
      --coral-text:   #8a2828;

      --shadow:       0 4px 16px rgba(140, 100, 60, 0.08);
      --shadow-soft:  0 2px 8px rgba(140, 100, 60, 0.06);

      --radius-sm:    8px;
      --radius-md:    14px;
      --radius-lg:    18px;
      --radius-xl:    24px;
      --radius-pill:  999px;
    }

    [data-theme="dark"] {
      --bg:           #2a2438;     /* 主背景 (深紫) */
      --surface:      #3d3454;     /* 卡片背景 */
      --surface-2:    #4a3f5e;

      --text:         #ffe4d6;     /* 主文字 (奶油色) */
      --text-soft:    #d4b8e0;
      --text-dim:     #a797c1;

      --primary:      #d4729b;
      --primary-dark: #2a2438;
      --secondary:    #6b5a4a;
      --secondary-dark:#ffd6a5;

      --accent-pink:  #d4729b;
      --accent-blue:  #7eb6e0;
      --accent-green: #95c4a3;
      --accent-coral: #e08aa3;

      --pink-text:    #2a2438;
      --blue-text:    #2a2438;
      --green-text:   #2a2438;
      --coral-text:   #2a2438;

      --shadow:       0 4px 20px rgba(0, 0, 0, 0.35);
      --shadow-soft:  0 2px 10px rgba(0, 0, 0, 0.25);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Quicksand', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.3s, color 0.3s;
    }
    body {
      position: relative;
    }

    #game-canvas { display: block; margin: 0 auto; position: relative; z-index: 1; }

    /* ============================================
       HUD (遊戲中)
       ============================================ */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .hud-item {}
    .hud-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .hud-value {
      font-size: 24px; font-weight: 700; color: var(--text);
    }
    #score-display .hud-value {
      color: var(--primary-dark);
    }
    [data-theme="dark"] #score-display .hud-value {
      color: var(--accent-pink);
    }
    #combo-display { text-align: center; flex: 1; transition: transform 0.08s; }
    #combo-display.pop { transform: scale(1.12); }
    #combo-display .hud-value {
      font-size: 50px; font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }
    [data-theme="dark"] #combo-display .hud-value {
      color: var(--accent-pink);
    }
    #combo-display.zero .hud-value { opacity: 0; }
    #combo-display.zero .hud-label { opacity: 0.3; }
    #accuracy-display { text-align: right; }

    /* ============================================
       共用 Overlay (主選單/詳情/結算)
       ============================================ */
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
      z-index: 100;
      transition: opacity 0.3s;
      padding: 20px 16px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    /* ============================================
       首頁 (Home Screen)
       ============================================ */
    .home-screen {
      display: block !important;
      position: fixed; inset: 0;
      overflow: hidden;
      padding: 0;
    }
    .home-theme-toggle {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      right: 16px;
      z-index: 5;
    }
    .home-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 360px;
      text-align: center;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .home-title-block {
      display: flex; flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .home-heart {
      font-size: 38px;
      color: var(--primary);
      animation: heartbeat 2s ease-in-out infinite;
    }
    [data-theme="dark"] .home-heart { color: var(--accent-pink); }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.12); }
      30% { transform: scale(1); }
      45% { transform: scale(1.08); }
      60% { transform: scale(1); }
    }
    .home-title {
      font-size: 42px;
      font-weight: 700;
      color: var(--secondary-dark);
      letter-spacing: 1px;
      line-height: 1;
    }
    [data-theme="dark"] .home-title { color: var(--secondary-dark); }
    .home-subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-top: 4px;
    }
    .home-start-btn {
      background: var(--primary);
      color: var(--primary-dark);
      border: none;
      border-radius: 18px;
      padding: 16px 56px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: var(--shadow);
      transition: transform 0.15s, filter 0.15s;
      animation: float 3s ease-in-out infinite;
      margin-top: 60px;
    }
    [data-theme="dark"] .home-start-btn { color: var(--primary-dark); }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .home-start-btn:active { transform: scale(0.96); filter: brightness(0.95); animation: none; }
    .home-hint {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* 飄浮的小裝飾 */
    .home-deco {
      position: absolute;
      pointer-events: none;
      color: var(--accent-pink);
      opacity: 0.45;
      z-index: 1;
      animation: drift 6s ease-in-out infinite;
    }
    [data-theme="dark"] .home-deco { color: var(--accent-pink); opacity: 0.55; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50%      { transform: translate(4px, -8px) rotate(8deg); }
    }
    .home-deco-1 { top: 18%;  left: 12%; font-size: 22px; animation-delay: 0s;   color: var(--accent-pink); }
    .home-deco-2 { top: 24%;  right: 14%; font-size: 16px; animation-delay: 1.2s; color: var(--accent-blue); }
    .home-deco-3 { bottom: 22%; left: 10%; font-size: 14px; animation-delay: 2.4s; color: var(--secondary-dark); opacity: 0.4; }
    .home-deco-4 { bottom: 28%; right: 12%; font-size: 18px; animation-delay: 0.8s; color: var(--accent-coral); }
    .home-deco-5 { top: 14%;  right: 32%; font-size: 13px; animation-delay: 3.6s; color: var(--accent-pink); }
    .home-deco-6 { bottom: 18%; left: 32%; font-size: 15px; animation-delay: 1.8s; color: var(--accent-blue); }
    [data-theme="dark"] .home-deco-1 { color: var(--accent-pink); }
    [data-theme="dark"] .home-deco-2 { color: var(--accent-blue); }
    [data-theme="dark"] .home-deco-3 { color: var(--secondary-dark); }
    [data-theme="dark"] .home-deco-4 { color: var(--accent-coral); }
    [data-theme="dark"] .home-deco-5 { color: var(--accent-pink); }
    [data-theme="dark"] .home-deco-6 { color: var(--accent-blue); }

    /* ============================================
       主選單頁 - 標題列
       ============================================ */
    .menu-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px 18px;
      flex-shrink: 0;
    }
    .menu-title-block { flex: 1; }
    .menu-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--secondary-dark);
      letter-spacing: 0.5px;
    }
    [data-theme="dark"] .menu-title { color: var(--secondary-dark); }
    .menu-tagline {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .theme-toggle {
      width: 38px; height: 38px;
      background: var(--surface);
      border: none;
      border-radius: 50%;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      font-size: 16px;
      color: var(--secondary-dark);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.2s;
    }
    .theme-toggle:active { transform: scale(0.92); }

    /* ============================================
       歌曲列表
       ============================================ */
    .song-list-wrapper {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 10px;
      max-width: 480px; width: 100%; margin: 0 auto;
    }
    #song-list {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* 歌曲卡片 (馬卡龍風格) */
    .song-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 12px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.15s, box-shadow 0.2s;
      position: relative;
    }
    .song-card.playing {
      box-shadow: 0 0 0 2px var(--primary), var(--shadow);
    }
    .song-card:active {
      transform: scale(0.98);
    }
    .song-card-row {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 10px;
    }

    /* 封面方塊 */
    .cover {
      width: 64px; height: 64px;
      border-radius: var(--radius-md);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      cursor: pointer;
      position: relative;
      isolation: isolate;
      transition: transform 0.15s;
    }
    .cover:active { transform: scale(0.94); }
    .cover.color-pink  { background: var(--accent-pink);  color: var(--pink-text); }
    .cover.color-blue  { background: var(--accent-blue);  color: var(--blue-text); }
    .cover.color-green { background: var(--accent-green); color: var(--green-text); }
    .cover.color-coral { background: var(--accent-coral); color: var(--coral-text); }

    /* 播放中的脈動 */
    .song-card.playing .cover {
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }

    /* YouTube 連結 (封面右下) */
    .yt-link {
      position: absolute;
      right: 4px; bottom: 4px;
      width: 22px; height: 16px;
      background: #ff0000;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      z-index: 5;
      text-decoration: none;
      transition: transform 0.12s;
    }
    .yt-link:active { transform: scale(0.92); }
    .yt-link svg { display: block; transform: translateX(1px); }

    /* 歌曲資訊 */
    .song-info {
      flex: 1; min-width: 0;
      cursor: pointer;
    }
    .song-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .diff-badges {
      display: flex; gap: 5px; margin-top: 6px;
    }
    .diff-badge {
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .diff-badge.easy   { background: var(--accent-green); color: var(--green-text); }
    .diff-badge.normal { background: var(--accent-blue);  color: var(--blue-text); }
    .diff-badge.hard   { background: var(--accent-pink);  color: var(--pink-text); }
    .diff-badge.insane { background: var(--accent-coral); color: var(--coral-text); }

    /* 卡片下方的 PLAY 按鈕 (preview 已移除) */
    .song-card-actions {
      display: flex; gap: 6px;
    }
    .play-btn {
      flex: 1;
      background: var(--primary);
      color: var(--primary-dark);
      border: none;
      border-radius: var(--radius-md);
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.12s, filter 0.15s;
      font-family: inherit;
    }
    [data-theme="dark"] .play-btn {
      color: var(--primary-dark);
    }
    .play-btn:active { transform: scale(0.97); filter: brightness(0.95); }

    /* ============================================
       歌曲詳情頁 (難度選擇)
       ============================================ */
    .detail-back {
      display: flex; align-items: center; gap: 4px;
      background: transparent;
      border: none;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 4px;
      cursor: pointer;
      font-family: inherit;
      align-self: flex-start;
    }
    .detail-content {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      max-width: 480px; width: 100%; margin: 0 auto;
      padding: 16px 8px;
    }
    .detail-cover {
      width: 140px; height: 140px;
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }
    .detail-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
    }
    .detail-meta-text {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 22px;
    }

    .difficulty-label {
      font-size: 11px;
      color: var(--text-soft);
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .difficulty-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 24px;
    }
    .diff-btn {
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      padding: 14px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.12s, border-color 0.2s;
      box-shadow: var(--shadow-soft);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .diff-btn:active { transform: scale(0.97); }
    .diff-btn .diff-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .diff-btn .diff-meta {
      font-size: 10px;
      color: var(--text-dim);
    }
    .diff-btn[data-diff="easy"]   .diff-name { color: var(--green-text); }
    .diff-btn[data-diff="normal"] .diff-name { color: var(--blue-text); }
    .diff-btn[data-diff="hard"]   .diff-name { color: var(--pink-text); }
    .diff-btn[data-diff="insane"] .diff-name { color: var(--coral-text); }
    [data-theme="dark"] .diff-btn[data-diff="easy"]   .diff-name { color: var(--accent-green); }
    [data-theme="dark"] .diff-btn[data-diff="normal"] .diff-name { color: var(--accent-blue); }
    [data-theme="dark"] .diff-btn[data-diff="hard"]   .diff-name { color: var(--accent-pink); }
    [data-theme="dark"] .diff-btn[data-diff="insane"] .diff-name { color: var(--accent-coral); }
    .diff-btn.selected[data-diff="easy"]   { border-color: var(--accent-green); }
    .diff-btn.selected[data-diff="normal"] { border-color: var(--accent-blue); }
    .diff-btn.selected[data-diff="hard"]   { border-color: var(--accent-pink); }
    .diff-btn.selected[data-diff="insane"] { border-color: var(--accent-coral); }
    .diff-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .start-button {
      width: 100%;
      max-width: 320px;
      background: var(--primary);
      color: var(--primary-dark);
      border: none;
      border-radius: var(--radius-md);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: var(--shadow);
      transition: transform 0.12s, filter 0.15s;
      margin-bottom: 14px;
    }
    .start-button:active { transform: scale(0.97); filter: brightness(0.95); }
    .start-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .key-hints {
      display: flex; gap: 8px;
      margin-top: 4px;
    }
    .key {
      width: 36px; height: 36px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
    }
    .loading-text {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 12px;
    }

    /* ============================================
       結算頁
       ============================================ */
    #results-screen {
      align-items: center; justify-content: center;
      gap: 4px;
    }
    .results-title {
      font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--text-soft);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .results-grade {
      font-size: 110px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 4px;
    }
    [data-theme="dark"] .results-grade { color: var(--accent-pink); }
    .results-grade.s, .results-grade.S { color: var(--secondary-dark); }
    [data-theme="dark"] .results-grade.s, [data-theme="dark"] .results-grade.S {
      color: #ffd6a5;
    }
    .results-perfect-badge {
      background: var(--secondary);
      color: var(--secondary-dark);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      margin-bottom: 12px;
    }
    .results-perfect-badge.hidden { display: none; }
    .results-score {
      font-size: 38px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .new-record {
      font-size: 12px;
      font-weight: 700;
      color: var(--coral-text);
      letter-spacing: 1px;
      padding: 4px 12px;
      background: var(--accent-coral);
      border-radius: var(--radius-pill);
      margin-bottom: 14px;
    }
    [data-theme="dark"] .new-record { color: var(--primary-dark); }
    .new-record.hidden { display: none; }
    .results-max-combo {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 24px;
    }
    .mc-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .mc-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
    }
    [data-theme="dark"] .mc-value { color: var(--accent-pink); }
    .results-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-width: 360px; width: 100%;
      margin-bottom: 28px;
    }
    .stat {
      background: var(--surface);

    /* ============================================
       遊戲中：退出按鈕 + 確認對話框
       ============================================ */
    .game-exit-btn {
      position: fixed;
      bottom: 14px; right: 14px;

    .confirm-modal {
      position: fixed; inset: 0;

      font-size: 18px;
      font-weight: 700;

    .confirm-buttons { display: flex; gap: 10px; }

      flex: 1;

      padding: 12px 0;

      border-radius: var(--radius-md);

    /* ============================================
       空狀態

      line-height: 1.6;
    }
    .empty-state a {
      color: var(--secondary-dark);
      text-decoration: underline;
    }
  </style>
</head>
<body>

      <button class="btn-primary" id="retry-btn">Retry</button>

  <div class="footer-hint">D · F · J · K</div>

  <script>
  // ============================================================
  // CONFIG
  // ============================================================
  const CONFIG = {
    lanes: 4,
    laneKeys: ['d', 'f', 'j', 'k'],
    fallTime: 1.1,
    windowPerfect: 0.045,
    windowGood:    0.090,
    windowOkay:    0.135,
    noteHeight: 22,
    hitLineY:   0.82,
    perfectScore: 100,
    goodScore:    60,
    okayScore:    30,
    // 音樂開始播放後等多少秒才出現第一顆音符 (給玩家先感受節奏)
    introDelay: 4.0,
  };

  const DIFFICULTY_PRESETS = {
    easy:   { fallTime: 1.4, windowPerfect: 0.060, windowGood: 0.110, windowOkay: 0.160 },
    normal: { fallTime: 1.1, windowPerfect: 0.045, windowGood: 0.090, windowOkay: 0.135 },
    hard:   { fallTime: 0.9, windowPerfect: 0.035, windowGood: 0.075, windowOkay: 0.115 },
    insane: { fallTime: 0.75, windowPerfect: 0.030, windowGood: 0.065, windowOkay: 0.100 },
  };

  // ============================================================
  // HIGH SCORES (localStorage)
  // ============================================================
  const Highscore = {
    key: 'neonbeat:highscores',
    load() {
      try { return JSON.parse(localStorage.getItem(this.key)) || {}; }
      catch (e) { return {}; }
    },
    get(songId, diff) {
      const all = this.load();
      return all[`${songId}:${diff}`] || 0;
    },
    set(songId, diff, score) {
      const all = this.load();
      const key = `${songId}:${diff}`;
      const existing = all[key] || 0;
      if (score > existing) {
        all[key] = score;
        try { localStorage.setItem(this.key, JSON.stringify(all)); } catch (e) {}
        return true; // new record
      }
      return false;
    },
  };

  // ============================================================
  // AUDIO ENGINE — Web Audio API
  // ============================================================
  class AudioEngine {
    constructor() {
      this.ctx = null;
      this.buffer = null;
      this.source = null;
      this.scheduledStart = 0;
    }
    async init() {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') await this.ctx.resume();
    }
    async loadFromUrl(url) {
      await this.init();
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Failed to fetch audio (${res.status})`);
      const arrayBuffer = await res.arrayBuffer();
      this.buffer = await this.ctx.decodeAudioData(arrayBuffer);
    }
    start(when) {
      this.stop();
      this.source = this.ctx.createBufferSource();
      this.source.buffer = this.buffer;
      this.source.connect(this.ctx.destination);
      this.source.start(when);
      this.scheduledStart = when;
    }
    stop() {
      if (this.source) {
        try { this.source.stop(); } catch (e) {}
        this.source.disconnect();
        this.source = null;
      }
    }
    getCurrentTime() { return this.ctx.currentTime - this.scheduledStart; }
    get audioTime() { return this.ctx.currentTime; }
    get duration()  { return this.buffer ? this.buffer.duration : 0; }
  }

  // ============================================================
  // BACKGROUND MUSIC PLAYER — 歌單頁背景音樂 (淡入淡出 + 全長循環)
  // ============================================================
  class BackgroundMusicPlayer {
    constructor(audioEngine) {
      this.engine = audioEngine;
      this.bufferCache = new Map();
      this.activeSource = null;
      this.activeGain = null;
      this.activeUrl = null;
      this.fadeDur = 0.4;          // 淡入淡出時間 (秒)
      this.targetVolume = 0.55;    // 背景音樂目標音量 (不要太大聲)
      this.onChange = null;        // 切歌時的 callback (UI 更新)
    }

    async play(url) {
      await this.engine.init();
      const ctx = this.engine.ctx;
      if (ctx.state === 'suspended') await ctx.resume();

      // 同首再點 → 視為停止
      if (this.activeUrl === url && this.activeSource) {
        this.stop();
        return false;
      }

      // 先淡出舊歌
      if (this.activeSource) {
        this._fadeOutAndStop();
      }

      // 載入 buffer
      let buffer = this.bufferCache.get(url);
      if (!buffer) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('BG fetch failed');
        const arrayBuffer = await res.arrayBuffer();
        buffer = await ctx.decodeAudioData(arrayBuffer);
        this.bufferCache.set(url, buffer);
      }

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;            // 全長循環
      const gain = ctx.createGain();
      source.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(this.targetVolume, now + this.fadeDur);

      source.start(now, 0);  // 從歌曲開頭播
      this.activeSource = source;
      this.activeGain = gain;
      this.activeUrl = url;

      if (this.onChange) this.onChange(url);
      return true;
    }

    _fadeOutAndStop() {
      if (!this.activeSource || !this.activeGain) return;
      const ctx = this.engine.ctx;
      const now = ctx.currentTime;
      const src = this.activeSource;
      const g = this.activeGain;
      try {
        g.gain.cancelScheduledValues(now);
        g.gain.setValueAtTime(g.gain.value, now);
        g.gain.linearRampToValueAtTime(0, now + this.fadeDur);
        setTimeout(() => {
          try { src.stop(); src.disconnect(); g.disconnect(); } catch (e) {}
        }, this.fadeDur * 1000 + 50);
      } catch (e) {}
      this.activeSource = null;
      this.activeGain = null;
      this.activeUrl = null;
    }

    stop() {
      const wasUrl = this.activeUrl;
      this._fadeOutAndStop();
      if (this.onChange && wasUrl) this.onChange(null);
    }

    isPlaying(url) {
      return this.activeUrl === url && this.activeSource !== null;
    }

    getCurrentUrl() {
      return this.activeUrl;
    }
  }

  // ============================================================
  // PARTICLE & JUDGMENT
  // ============================================================
  class Particle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 9;
      this.vy = -2 - Math.random() * 6;
      this.life = 1;
      this.color = color;
      this.size = 2 + Math.random() * 3;
    }
    update(dt) { this.x += this.vx; this.y += this.vy; this.vy += 0.55; this.vx *= 0.97; this.life -= dt * 1.6; }
    draw(ctx) {
      if (this.life <= 0) return;
      ctx.save(); ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color; ctx.shadowBlur = 14; ctx.shadowColor = this.color;
      ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
      ctx.restore();
    }
  }
  class Judgment {
    constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1; this.maxLife = 0.7; }
    update(dt) { this.life -= dt / this.maxLife; this.y -= 32 * dt; }
    draw(ctx) {
      if (this.life <= 0) return;
      ctx.save(); ctx.globalAlpha = Math.min(1, this.life * 1.5);
      ctx.fillStyle = this.color; ctx.shadowBlur = 18; ctx.shadowColor = this.color;
      ctx.font = 'bold 20px Quicksand, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(this.text, this.x, this.y); ctx.restore();
    }
  }

  // ============================================================
  // GAME
  // ============================================================
  class Game {
    constructor() {
      this.canvas = document.getElementById('game-canvas');
      this.ctx2d = this.canvas.getContext('2d');
      this.audio = new AudioEngine();
      this.notes = [];
      this.particles = [];
      this.judgments = [];
      this.score = 0; this.combo = 0; this.maxCombo = 0;
      this.totalNotes = 0;
      this.stats = { perfect: 0, good: 0, okay: 0, miss: 0 };
      this.pressedLanes = [false, false, false, false];
      this.laneFlash = [0, 0, 0, 0];
      this.holdingNote = [null, null, null, null]; // 每軌目前正在按住的長按音符
      this.touchToLane = new Map();
      this.running = false;
      this.paused = false;
      this.lastFrameTime = 0;
      this.endTime = 0;
      this.currentSong = null;
      this.currentDifficulty = 'normal';
      this.onEnd = null;
      this.resize();
      window.addEventListener('resize', () => this.resize());
      this.bindInput();
    }
    resize() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.min(window.innerWidth, 540);
      const h = window.innerHeight;
      this.canvas.width = w * dpr; this.canvas.height = h * dpr;
      this.canvas.style.width = w + 'px'; this.canvas.style.height = h + 'px';
      this.ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
      this.viewW = w; this.viewH = h;
      this.laneWidth = w / CONFIG.lanes;
      this.hitY = h * CONFIG.hitLineY;
      this.spawnY = -CONFIG.noteHeight;
    }
    bindInput() {
      document.addEventListener('keydown', e => {
        if (!this.running || e.repeat) return;
        const lane = CONFIG.laneKeys.indexOf(e.key.toLowerCase());
        if (lane !== -1 && !this.pressedLanes[lane]) {
          this.pressedLanes[lane] = true; this.laneFlash[lane] = 1;
          this.handleHit(lane);
        }
      });
      document.addEventListener('keyup', e => {
        const lane = CONFIG.laneKeys.indexOf(e.key.toLowerCase());
        if (lane !== -1 && this.pressedLanes[lane]) {
          this.pressedLanes[lane] = false;
          this.handleRelease(lane);
        }
      });
      const touchHandler = (e, isStart) => {
        if (!this.running) return;
        e.preventDefault();
        const rect = this.canvas.getBoundingClientRect();
        for (const t of e.changedTouches) {
          const x = t.clientX - rect.left;
          const lane = Math.floor(x / this.laneWidth);
          if (lane < 0 || lane >= CONFIG.lanes) continue;
          if (isStart) {
            this.touchToLane.set(t.identifier, lane);
            if (!this.pressedLanes[lane]) {
              this.pressedLanes[lane] = true; this.laneFlash[lane] = 1;
              this.handleHit(lane);
            }
          } else {
            const released = this.touchToLane.get(t.identifier);
            if (released !== undefined) {
              this.touchToLane.delete(t.identifier);
              const stillHeld = [...this.touchToLane.values()].includes(released);
              if (!stillHeld) {
                this.pressedLanes[released] = false;
                this.handleRelease(released);
              }
            }
          }
        }
      };
      this.canvas.addEventListener('touchstart',  e => touchHandler(e, true),  { passive: false });
      this.canvas.addEventListener('touchend',    e => touchHandler(e, false), { passive: false });
      this.canvas.addEventListener('touchcancel', e => touchHandler(e, false), { passive: false });
    }

    setDifficulty(diff) {
      this.currentDifficulty = diff;
      Object.assign(CONFIG, DIFFICULTY_PRESETS[diff]);
    }

    async loadSong(songMeta) {
      this.currentSong = songMeta;
      const folder = `songs/${songMeta.id}/`;
      const bust = `?v=${Date.now()}`;
      const [chartRes, _] = await Promise.all([
        fetch(folder + 'charts.json' + bust, { cache: 'no-store' }).then(r => r.json()),
        // 音檔不加 bust，因為大檔不常變動，讓快取保留可加快重複播放
        this.audio.loadFromUrl(folder + songMeta.audio),
      ]);
      this.allCharts = chartRes.charts;
    }

    async start(diff) {
      this.setDifficulty(diff);
      const rawNotes = this.allCharts[diff];
      // 過濾掉太早的音符 (introDelay 秒前的)，讓玩家先聽幾秒音樂
      this.notes = rawNotes
        .filter(n => n.time >= CONFIG.introDelay)
        .map((n, i) => ({
          id: i,
          time: n.time,
          lane: n.lane,
          duration: n.duration || 0,  // 0 = tap, >0 = hold
          hit: false,
          missed: false,
          holding: false,
          completed: false,  // hold 完成標記
        }));
      this.totalNotes = this.notes.length;
      this.particles = []; this.judgments = [];
      this.score = 0; this.combo = 0; this.maxCombo = 0;
      this.stats = { perfect: 0, good: 0, okay: 0, miss: 0 };
      this.holdingNote = [null, null, null, null];
      this.paused = false;

      if (this.audio.ctx.state === 'suspended') await this.audio.ctx.resume();
      // introDelay 已涵蓋緩衝時間，只需要極短的 audio 啟動延遲
      const leadIn = 0.3;
      const audioStart = this.audio.audioTime + leadIn;
      this.audio.start(audioStart);

      this.endTime = this.audio.duration + 1.2;
      this.running = true;
      this.lastFrameTime = performance.now();
      requestAnimationFrame(t => this.loop(t));
    }

    abort() {
      this.running = false;
      this.paused = false;
      this.audio.stop();
    }

    pause() {
      if (!this.running || this.paused) return;
      this.paused = true;
      // 暫停 AudioContext 讓音樂跟邏輯時間都停下來
      if (this.audio.ctx && this.audio.ctx.state === 'running') {
        this.audio.ctx.suspend();
      }
    }

    resume() {
      if (!this.running || !this.paused) return;
      this.paused = false;
      this.lastFrameTime = performance.now();  // 避免 dt 暴衝
      if (this.audio.ctx && this.audio.ctx.state === 'suspended') {
        this.audio.ctx.resume();
      }
    }

    loop(timestamp) {
      if (!this.running) return;
      if (this.paused) {
        // 暫停中：保持 draw (顯示凍結畫面) 但不 update
        this.draw();
        requestAnimationFrame(t => this.loop(t));
        return;
      }
      const dt = Math.min((timestamp - this.lastFrameTime) / 1000, 0.05);
      this.lastFrameTime = timestamp;
      this.update(dt); this.draw();
      if (this.audio.getCurrentTime() < this.endTime) requestAnimationFrame(t => this.loop(t));
      else this.end();
    }
    update(dt) {
      const t = this.audio.getCurrentTime();
      // 一般 miss 偵測：超過判定窗還沒被擊中
      for (const note of this.notes) {
        if (note.hit || note.missed) continue;
        if (t - note.time > CONFIG.windowOkay) {
          note.missed = true;
          this.recordJudgment('miss', note.lane);
        }
      }
      // 長按完成偵測：如果某軌正在按住的長按，時間已到結尾，視為成功完成
      for (let lane = 0; lane < CONFIG.lanes; lane++) {
        const note = this.holdingNote[lane];
        if (!note) continue;
        const endTime = note.time + note.duration;
        if (t >= endTime - 0.05) {
          // 完成長按 → 給予獎勵
          note.completed = true;
          note.holding = false;
          this.holdingNote[lane] = null;
          const bonus = Math.floor(50 + note.duration * 50);
          this.score += bonus * (1 + this.combo * 0.005);
          this.combo++;
          this.maxCombo = Math.max(this.maxCombo, this.combo);
          const x = lane * this.laneWidth + this.laneWidth / 2;
          for (let i = 0; i < 14; i++) {
            this.particles.push(new Particle(x, this.hitY, '#ffd6a5'));
          }
          this.judgments.push(new Judgment(x, this.hitY - 56, 'HOLD!', '#ffd6a5'));
        }
      }
      for (const p of this.particles) p.update(dt);
      this.particles = this.particles.filter(p => p.life > 0);
      for (const j of this.judgments) j.update(dt);
      this.judgments = this.judgments.filter(j => j.life > 0);
      for (let i = 0; i < CONFIG.lanes; i++) this.laneFlash[i] = Math.max(0, this.laneFlash[i] - dt * 4);
      this.updateHUD();
    }
    draw() {
      const ctx = this.ctx2d, w = this.viewW, h = this.viewH;
      // 馬卡龍主題：深紫底而非純黑，配合柔和粉嫩色調
      ctx.fillStyle = '#2a2438'; ctx.fillRect(0, 0, w, h);
      for (let i = 0; i < CONFIG.lanes; i++) {
        const x = i * this.laneWidth;
        const grad = ctx.createLinearGradient(x, 0, x, h);
        grad.addColorStop(0, 'rgba(61, 52, 84, 0.5)');
        grad.addColorStop(1, 'rgba(61, 52, 84, 0)');
        ctx.fillStyle = grad; ctx.fillRect(x, 0, this.laneWidth, h);
        if (this.laneFlash[i] > 0 || this.pressedLanes[i]) {
          const intensity = this.pressedLanes[i] ? 1 : this.laneFlash[i];
          const color = (i === 1 || i === 2) ? '255, 175, 204' : '189, 224, 254';
          const fg = ctx.createLinearGradient(x, this.hitY - 240, x, this.hitY);
          fg.addColorStop(0, `rgba(${color}, 0)`);
          fg.addColorStop(1, `rgba(${color}, ${0.32 * intensity})`);
          ctx.fillStyle = fg; ctx.fillRect(x, this.hitY - 240, this.laneWidth, 240);
        }
      }
      ctx.strokeStyle = 'rgba(189, 224, 254, 0.18)'; ctx.lineWidth = 1;
      for (let i = 0; i <= CONFIG.lanes; i++) {
        ctx.beginPath(); ctx.moveTo(i * this.laneWidth, 0); ctx.lineTo(i * this.laneWidth, h); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255, 175, 204, 0.75)'; ctx.lineWidth = 3;
      ctx.shadowBlur = 22; ctx.shadowColor = '#ffafcc';
      ctx.beginPath(); ctx.moveTo(0, this.hitY); ctx.lineTo(w, this.hitY); ctx.stroke();
      ctx.shadowBlur = 0;
      for (let i = 0; i < CONFIG.lanes; i++) {
        const x = i * this.laneWidth, pressed = this.pressedLanes[i];
        ctx.strokeStyle = pressed ? '#bde0fe' : 'rgba(170, 158, 196, 0.4)';
        ctx.lineWidth = pressed ? 2 : 1;
        ctx.strokeRect(x + 4, this.hitY + 8, this.laneWidth - 8, 56);
        ctx.fillStyle = pressed ? '#bde0fe' : 'rgba(170, 158, 196, 0.6)';
        ctx.font = 'bold 16px Quicksand, sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(CONFIG.laneKeys[i].toUpperCase(), x + this.laneWidth / 2, this.hitY + 42);
      }
      const t = this.audio.getCurrentTime();

      // 1. 先畫長按拖尾 (在頭部下面層)
      for (const note of this.notes) {
        if (note.duration <= 0) continue;
        if (note.completed) continue;
        if (note.missed) continue;
        const noteEndTime = note.time + note.duration;
        const tuHead = note.time - t;
        const tuTail = noteEndTime - t;
        const isActiveHold = note.hit && note.holding;

        // 可見性檢查 (active hold 時永遠畫，因為頭部釘在判定線)
        if (!isActiveHold) {
          if (tuHead > CONFIG.fallTime) continue;       // 頭部還沒進入畫面
          if (tuTail < -CONFIG.windowOkay - 0.2) continue; // 整條已通過
        } else {
          if (tuTail < -0.05) continue; // active hold 但拖尾完全結束
        }

        // 計算 head 與 tail tip 的螢幕 y
        let headProg = 1 - (tuHead / CONFIG.fallTime);
        let tailProg = 1 - (tuTail / CONFIG.fallTime);
        let headY = this.spawnY + (this.hitY - this.spawnY) * headProg;
        const tailY = this.spawnY + (this.hitY - this.spawnY) * tailProg;

        // 如果頭已被按下並且仍在按住中，頭部停在判定線
        if (isActiveHold) headY = this.hitY;

        const x = note.lane * this.laneWidth;
        const color = (note.lane === 1 || note.lane === 2) ? '#ffafcc' : '#bde0fe';
        const padding = 14;
        const tailX = x + padding;
        const tailW = this.laneWidth - padding * 2;

        // 畫拖尾 (tail tip 在上、head 在下)
        const top = Math.min(tailY, headY);
        const bot = Math.max(tailY, headY);
        if (bot - top > 1) {
          ctx.save();
          ctx.globalAlpha = isActiveHold ? 0.55 : 0.32;
          const grad = ctx.createLinearGradient(0, top, 0, bot);
          grad.addColorStop(0, color + '00');  // 上端漸透明
          grad.addColorStop(0.25, color + '88');
          grad.addColorStop(1, color + 'cc');
          ctx.fillStyle = grad;
          ctx.shadowBlur = isActiveHold ? 12 : 6;
          ctx.shadowColor = color;
          ctx.fillRect(tailX, top, tailW, bot - top);
          // 中間發光細線 (active 時更亮，但比之前淡)
          if (isActiveHold) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.shadowBlur = 0;
            ctx.fillRect(tailX + tailW / 2 - 1, top, 2, bot - top);
          }
          ctx.restore();
        }
      }

      // 2. 畫一般音符的頭 (tap 與 hold 共用)
      for (const note of this.notes) {
        if (note.hit && note.duration <= 0) continue;     // tap 命中後不再畫
        if (note.completed) continue;                      // hold 完成後不畫
        if (note.missed) continue;
        const tu = note.time - t;
        if (tu > CONFIG.fallTime) continue;
        if (note.duration <= 0 && tu < -CONFIG.windowOkay) continue;

        let progress = 1 - (tu / CONFIG.fallTime);
        let y = this.spawnY + (this.hitY - this.spawnY) * progress;
        // 長按按住中時，頭部停在判定線上發光
        if (note.hit && note.holding) y = this.hitY;

        const x = note.lane * this.laneWidth;
        const color = (note.lane === 1 || note.lane === 2) ? '#ffafcc' : '#bde0fe';
        ctx.save();
        ctx.shadowBlur = note.holding ? 28 : 18;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        const padding = 10, noteX = x + padding, noteW = this.laneWidth - padding * 2, noteH = CONFIG.noteHeight;
        this.roundRect(ctx, noteX, y - noteH / 2, noteW, noteH, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
        ctx.fillRect(noteX + 3, y - noteH / 2 + 3, noteW - 6, 2);
        ctx.restore();
      }
      for (const p of this.particles) p.draw(ctx);
      for (const j of this.judgments) j.draw(ctx);

      // Intro countdown overlay - 在第一顆音符出現前顯示提示
      const elapsed = this.audio.getCurrentTime();
      if (elapsed < CONFIG.introDelay && elapsed > -1) {
        const remaining = CONFIG.introDelay - elapsed;
        ctx.save();
        ctx.textAlign = 'center';

        if (remaining > 3) {
          // 早期：GET READY 訊息
          const opacity = Math.min(1, (CONFIG.introDelay - remaining) / 0.6);
          ctx.globalAlpha = opacity;
          ctx.fillStyle = '#bde0fe';
          ctx.shadowBlur = 24;
          ctx.shadowColor = '#bde0fe';
          ctx.font = 'bold 32px Quicksand, sans-serif';
          ctx.fillText('GET READY', w / 2, h * 0.42);

          ctx.font = '11px JetBrains Mono, monospace';
          ctx.globalAlpha = opacity * 0.7;
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#6b7a90';
          ctx.fillText('感受節奏', w / 2, h * 0.46);
        } else if (remaining > 0) {
          // 倒數 3-2-1：每秒一個大數字，會放大淡出
          const num = Math.max(1, Math.ceil(remaining));
          const fracInSec = num - remaining; // 0 到 1，秒內的進度
          const scale = 1 + fracInSec * 0.4;
          const alpha = 1 - fracInSec * 0.85;

          ctx.globalAlpha = alpha;
          ctx.fillStyle = num === 1 ? '#ffafcc' : '#bde0fe';
          ctx.shadowBlur = 40;
          ctx.shadowColor = ctx.fillStyle;
          ctx.font = `bold ${Math.floor(110 * scale)}px Quicksand, sans-serif`;
          ctx.fillText(String(num), w / 2, h * 0.5);
        }
        ctx.restore();
      }
    }
    roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath(); ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
    }
    handleHit(lane) {
      const t = this.audio.getCurrentTime();
      // 「消除窗」比 okay window 大 70ms，讓太早/太晚的按鍵也能消耗對應音符 (避免雙重 miss)
      const consumeWindow = CONFIG.windowOkay + 0.07;

      let closestNote = null;
      let closestDelta = Infinity;
      for (const note of this.notes) {
        if (note.hit || note.missed || note.lane !== lane) continue;
        const delta = note.time - t;
        if (Math.abs(delta) < Math.abs(closestDelta) && Math.abs(delta) <= consumeWindow) {
          closestDelta = delta;
          closestNote = note;
        }
      }

      if (closestNote) {
        const absDelta = Math.abs(closestDelta);
        if (absDelta <= CONFIG.windowOkay) {
          // 在判定窗內 → 命中
          closestNote.hit = true;
          const j = absDelta <= CONFIG.windowPerfect ? 'perfect'
                  : absDelta <= CONFIG.windowGood    ? 'good'
                                                    : 'okay';
          this.recordJudgment(j, lane);
          // 如果是長按音符，開始追蹤按住狀態
          if (closestNote.duration > 0) {
            this.holdingNote[lane] = closestNote;
            closestNote.holding = true;
          }
        } else {
          // 太早/太晚但在消除窗內 → 消耗該音符並判 miss
          closestNote.missed = true;
          this.recordJudgment('miss', lane);
        }
      } else {
        // 附近沒有音符 → 空按 miss
        this.recordJudgment('miss', lane);
      }
    }

    handleRelease(lane) {
      // 如果該軌正在按住長按音符
      const note = this.holdingNote[lane];
      if (!note) return;
      const t = this.audio.getCurrentTime();
      const endTime = note.time + note.duration;

      this.holdingNote[lane] = null;
      note.holding = false;

      if (note.completed) return;
      note.completed = true;  // 標記結束 (視覺停止顯示拖尾)

      // 計算「按住的比例」 — 0 (剛按就放) 到 1 (完整按完)
      const heldDuration = Math.max(0, t - note.time);
      const ratio = Math.min(1, heldDuration / note.duration);

      // 分數依比例給：完整 100% 拿到 50 + duration*50；中途放比例縮減
      const fullBonus = Math.floor(50 + note.duration * 50);
      const earnedBonus = Math.floor(fullBonus * ratio);
      this.score += earnedBonus * (1 + this.combo * 0.005);

      const x = lane * this.laneWidth + this.laneWidth / 2;
      if (ratio >= 0.95) {
        // 接近完整 → HOLD! 大字 + combo +1 + 金粒子
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
        for (let i = 0; i < 14; i++) {
          this.particles.push(new Particle(x, this.hitY, '#ffd6a5'));
        }
        this.judgments.push(new Judgment(x, this.hitY - 56, 'HOLD!', '#ffd6a5'));
      } else if (ratio >= 0.4) {
        // 中段放開 → 綠色粒子，無大字提示，不斷 combo
        for (let i = 0; i < 8; i++) {
          this.particles.push(new Particle(x, this.hitY, '#b8e0c8'));
        }
      }
      // 立刻放開 (<40%): 沒有任何 miss 或斷 combo，純粹少拿分而已
    }
    recordJudgment(type, lane) {
      this.stats[type]++;
      const colors = { perfect: '#ffd6a5', good: '#b8e0c8', okay: '#bde0fe', miss: '#ffadad' };
      const labels = { perfect: 'PERFECT', good: 'GOOD', okay: 'OKAY', miss: 'MISS' };
      if (type === 'miss') { this.combo = 0; }
      else {
        this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo);
        const pts = type === 'perfect' ? CONFIG.perfectScore : type === 'good' ? CONFIG.goodScore : CONFIG.okayScore;
        this.score += Math.floor(pts * (1 + this.combo * 0.005));
        const x = lane * this.laneWidth + this.laneWidth / 2, y = this.hitY;
        const count = type === 'perfect' ? 18 : type === 'good' ? 12 : 7;
        for (let i = 0; i < count; i++) this.particles.push(new Particle(x, y, colors[type]));
      }
      const x = lane * this.laneWidth + this.laneWidth / 2;
      this.judgments.push(new Judgment(x, this.hitY - 56, labels[type], colors[type]));
    }
    updateHUD() {
      document.querySelector('#score-display .hud-value').textContent =
        String(Math.floor(this.score)).padStart(6, '0');
      const c = document.getElementById('combo-display');
      c.querySelector('.hud-value').textContent = this.combo;
      c.classList.toggle('zero', this.combo === 0);
      const total = this.stats.perfect + this.stats.good + this.stats.okay + this.stats.miss;
      let acc = 100;
      if (total > 0) {
        const w = this.stats.perfect * 1 + this.stats.good * 0.7 + this.stats.okay * 0.4;
        acc = (w / total) * 100;
      }
      document.querySelector('#accuracy-display .hud-value').textContent = acc.toFixed(2) + '%';
    }
    end() {
      this.running = false;
      this.audio.stop();
      const total = this.totalNotes;
      const w = this.stats.perfect * 1 + this.stats.good * 0.7 + this.stats.okay * 0.4;
      const acc = total > 0 ? (w / total) * 100 : 0;
      let grade = 'F';
      if (acc >= 95) grade = 'S';
      else if (acc >= 88) grade = 'A';
      else if (acc >= 78) grade = 'B';
      else if (acc >= 65) grade = 'C';
      else if (acc >= 50) grade = 'D';
      const isNewRecord = Highscore.set(this.currentSong.id, this.currentDifficulty, Math.floor(this.score));
      if (this.onEnd) this.onEnd({
        grade, score: Math.floor(this.score), stats: { ...this.stats },
        maxCombo: this.maxCombo,
        difficulty: this.currentDifficulty, isNewRecord, song: this.currentSong,
      });
    }
  }

  // ============================================================
  // APP — 主控狀態機
  // ============================================================
  class App {
    constructor() {
      this.songs = [];
      this.currentSong = null;
      this.selectedDifficulty = 'normal';
      this.game = new Game();
      this.game.onEnd = (result) => this.showResults(result);
      this.bgMusic = new BackgroundMusicPlayer(this.game.audio);
      this.bgMusic.onChange = (url) => this.refreshPlayingHighlight(url);

      this.menuEl    = document.getElementById('menu-screen');
      this.detailEl  = document.getElementById('detail-screen');
      this.resultsEl = document.getElementById('results-screen');

      this.initTheme();
      this.bindUI();
    }

    initTheme() {
      const saved = localStorage.getItem('neonbeat:theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      this.updateThemeToggleIcon(saved);
    }

    updateThemeToggleIcon(theme) {
      const icon = theme === 'dark' ? '☀' : '☾';
      const b1 = document.getElementById('theme-toggle');
      const b2 = document.getElementById('home-theme-toggle');
      if (b1) b1.textContent = icon;
      if (b2) b2.textContent = icon;
    }

    toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('neonbeat:theme', next);
      this.updateThemeToggleIcon(next);
    }

    async init() {
      // 加上 cache-busting 字串，避免 iOS WKWebView 給舊版 JSON
      const bust = `?v=${Date.now()}`;
      try {
        const res = await fetch('songs/index.json' + bust, { cache: 'no-store' });
        if (!res.ok) throw new Error('index.json not found');
        const data = await res.json();
        const songsFromIndex = data.songs || [];

        // 從每首歌獨立的 meta.json 讀取最新資料 (這樣只要改 meta.json 就會反映)
        const fullMetas = await Promise.all(
          songsFromIndex.map(async (entry) => {
            try {
              const r = await fetch(`songs/${entry.id}/meta.json` + bust, { cache: 'no-store' });
              if (!r.ok) throw new Error(`meta ${entry.id} status ${r.status}`);
              const meta = await r.json();
              // 合併 index 的資料當 fallback (避免 meta 缺欄位)
              return { ...entry, ...meta };
            } catch (e) {
              console.warn(`Could not load meta for ${entry.id}, using index data:`, e.message);
              return entry;
            }
          })
        );
        this.songs = fullMetas;
        // 依標題排序 (跟 index.json 一致)
        this.songs.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      } catch (e) {
        console.warn('Could not load songs/index.json:', e.message);
        this.songs = [];
      }
      this.renderSongList();
    }

    renderSongList() {
      const container = document.getElementById('song-list');
      container.innerHTML = '';

      if (this.songs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            No songs found.<br><br>
            Add one with:<br>
            <code>python3 tools/add_song.py path/to/song.mp3</code>
          </div>
        `;
        return;
      }

      const coverColors = ['color-pink', 'color-blue', 'color-green', 'color-coral'];
      const coverIcons = ['♪', '♫', '✿', '☾', '☆', '♡'];

      for (const song of this.songs) {
        const card = document.createElement('div');
        card.className = 'song-card';
        card.dataset.songId = song.id;

        const dur = `${Math.floor(song.duration / 60)}:${String(Math.floor(song.duration % 60)).padStart(2, '0')}`;
        const bpm = Math.round(song.bpm);

        // 從 id 決定封面顏色與 icon (穩定 hash)
        const hash = [...song.id].reduce((a, c) => (a * 31 + c.charCodeAt(0)) >>> 0, 7);
        const colorClass = coverColors[hash % coverColors.length];
        const iconChar = coverIcons[hash % coverIcons.length];

        const audioUrl = `songs/${song.id}/${song.audio}`;
        if (this.bgMusic && this.bgMusic.isPlaying(audioUrl)) {
          card.classList.add('playing');
        }

        card.innerHTML = `
          <div class="song-card-row">
            <div class="cover ${colorClass}" data-action="cover">
              ${iconChar}
              ${song.youtube ? `
                <a class="yt-link" href="${song.youtube}" target="_blank" rel="noopener noreferrer" title="在 YouTube 上觀看">
                  <svg viewBox="0 0 24 24" width="11" height="11" aria-hidden="true">
                    <polygon points="8,5 8,19 19,12" fill="white"/>
                  </svg>
                </a>
              ` : ''}
            </div>
            <div class="song-info" data-action="info">
              <div class="song-name">${song.title}</div>
              <div class="song-meta">${song.artist || 'Unknown'} · ${bpm} BPM · ${dur}</div>
              <div class="diff-badges">
                <span class="diff-badge easy">E</span>
                <span class="diff-badge normal">N</span>
                <span class="diff-badge hard">H</span>
                <span class="diff-badge insane">I</span>
              </div>
            </div>
          </div>
          <div class="song-card-actions">
            <button class="play-btn" data-action="play">► PLAY</button>
          </div>
        `;

        // 點封面 → 切換背景音樂試聽
        card.querySelector('[data-action="cover"]').addEventListener('click', (e) => {
          if (e.target.closest('.yt-link')) return;
          e.stopPropagation();
          this.toggleBgMusic(song);
        });

        // 點 PLAY 按鈕 → 進入難度頁 (進遊戲的唯一入口)
        card.querySelector('[data-action="play"]').addEventListener('click', (e) => {
          e.stopPropagation();
          this.selectSong(song);
        });

        // 點歌曲資訊區 → 切換背景音樂試聽 (跟封面一樣)
        card.querySelector('[data-action="info"]').addEventListener('click', (e) => {
          e.stopPropagation();
          this.toggleBgMusic(song);
        });

        // YouTube 連結阻止冒泡
        const ytLink = card.querySelector('.yt-link');
        if (ytLink) {
          ytLink.addEventListener('click', (e) => e.stopPropagation());
        }

        container.appendChild(card);
      }
    }

    async toggleBgMusic(song) {
      this.lastPlayedSong = song;
      const url = `songs/${song.id}/${song.audio}`;
      try {
        await this.bgMusic.play(url);
      } catch (e) {
        console.warn('BG music error:', e);
      }
    }

    refreshPlayingHighlight(activeUrl) {
      const cards = document.querySelectorAll('.song-card');
      cards.forEach(card => {
        const songId = card.dataset.songId;
        const song = this.songs.find(s => s.id === songId);
        if (!song) return;
        const url = `songs/${song.id}/${song.audio}`;
        card.classList.toggle('playing', activeUrl === url);
      });
    }

    bindUI() {
      document.getElementById('back-btn').addEventListener('click', () => this.showMenu());
      document.getElementById('results-back-btn').addEventListener('click', () => this.showMenu());

      document.getElementById('theme-toggle').addEventListener('click', () => this.toggleTheme());
      document.getElementById('home-theme-toggle').addEventListener('click', () => this.toggleTheme());

      document.getElementById('home-start-btn').addEventListener('click', () => this.enterSongList());

      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          this.selectedDifficulty = btn.dataset.diff;
        });
      });

      document.getElementById('start-btn').addEventListener('click', async () => {
        this.bgMusic.stop();
        document.getElementById('detail-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('game-exit-btn').classList.remove('hidden');
        await this.game.start(this.selectedDifficulty);
      });

      document.getElementById('retry-btn').addEventListener('click', async () => {
        this.bgMusic.stop();
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('game-exit-btn').classList.remove('hidden');
        await this.game.start(this.selectedDifficulty);
      });

      // 遊玩中的退出按鈕 → 顯示確認對話框 + 暫停遊戲
      document.getElementById('game-exit-btn').addEventListener('click', () => {
        this.game.pause();
        document.getElementById('exit-confirm-modal').classList.remove('hidden');
      });
      // 取消 → 關閉對話框，恢復遊戲
      document.getElementById('exit-cancel-btn').addEventListener('click', () => {
        document.getElementById('exit-confirm-modal').classList.add('hidden');
        this.game.resume();
      });
      // 確認退出
      document.getElementById('exit-confirm-btn').addEventListener('click', () => {
        document.getElementById('exit-confirm-modal').classList.add('hidden');
        this.exitGame();
      });
    }

    exitGame() {
      this.game.abort();
      document.getElementById('game-exit-btn').classList.add('hidden');
      document.getElementById('results-screen').classList.add('hidden');
      // 回到該歌的難度選擇頁，並接著播這首歌
      if (this.currentSong) {
        document.getElementById('detail-screen').classList.remove('hidden');
        this.toggleBgMusic(this.currentSong);
      } else {
        document.getElementById('menu-screen').classList.remove('hidden');
      }
    }

    async selectSong(song) {
      this.currentSong = song;
      document.getElementById('menu-screen').classList.add('hidden');
      document.getElementById('detail-screen').classList.remove('hidden');
      document.getElementById('detail-name').textContent = song.title;
      const dur = `${Math.floor(song.duration / 60)}:${String(Math.floor(song.duration % 60)).padStart(2, '0')}`;
      document.getElementById('detail-meta').textContent = `${song.artist || 'Unknown'} · ${Math.round(song.bpm)} BPM · ${dur}`;

      // 設定詳情頁封面顏色與 icon (與歌單卡片一致)
      const coverColors = ['color-pink', 'color-blue', 'color-green', 'color-coral'];
      const coverIcons = ['♪', '♫', '✿', '☾', '☆', '♡'];
      const hash = [...song.id].reduce((a, c) => (a * 31 + c.charCodeAt(0)) >>> 0, 7);
      const coverEl = document.getElementById('detail-cover');
      coverEl.className = 'detail-cover ' + coverColors[hash % coverColors.length];
      coverEl.textContent = coverIcons[hash % coverIcons.length];

      // 還原預選的難度視覺
      document.querySelectorAll('.diff-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.diff === this.selectedDifficulty);
      });

      // 載入 + 顯示難度音符數
      const startBtn = document.getElementById('start-btn');
      const loadingEl = document.getElementById('loading-text');
      startBtn.disabled = true;
      startBtn.textContent = 'LOADING…';
      loadingEl.textContent = '';
      try {
        await this.game.loadSong(song);
        for (const diff of ['easy', 'normal', 'hard', 'insane']) {
          const notes = this.game.allCharts[diff];
          if (!notes) {
            document.getElementById(`meta-${diff}`).textContent = '—';
            const btn = document.querySelector(`.diff-btn[data-diff="${diff}"]`);
            if (btn) btn.disabled = true;
            continue;
          }
          const btn = document.querySelector(`.diff-btn[data-diff="${diff}"]`);
          if (btn) btn.disabled = false;
          const nps = (notes.length / song.duration).toFixed(1);
          const hi = Highscore.get(song.id, diff);
          const hiText = hi ? ` · best ${String(hi).padStart(6,'0')}` : '';
          document.getElementById(`meta-${diff}`).textContent = `${notes.length} notes · ${nps}/s${hiText}`;
        }
        if (!this.game.allCharts[this.selectedDifficulty]) {
          this.selectedDifficulty = 'normal';
          document.querySelectorAll('.diff-btn').forEach(b => {
            b.classList.toggle('selected', b.dataset.diff === 'normal');
          });
        }
        startBtn.disabled = false;
        startBtn.textContent = 'START';
        loadingEl.textContent = '';
      } catch (e) {
        loadingEl.textContent = 'Error: ' + e.message;
      }
    }

    enterSongList() {
      // 從首頁點 START 進入歌單 → 這是合法的 user gesture
      // 可以在這裡開始播放音樂 (繞過 iOS 自動播放限制)
      document.getElementById('home-screen').classList.add('hidden');
      document.getElementById('menu-screen').classList.remove('hidden');
      this.renderSongList();

      // 自動播放第一首歌
      if (this.songs.length > 0) {
        const firstSong = this.songs[0];
        this.toggleBgMusic(firstSong);
      }
    }

    showMenu() {
      this.game.abort();
      document.getElementById('menu-screen').classList.remove('hidden');
      document.getElementById('detail-screen').classList.add('hidden');
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('game-exit-btn').classList.add('hidden');
      this.renderSongList();
      // 玩完一場回歌單 → 自動接著播剛才那首
      if (this.lastPlayedSong) {
        this.toggleBgMusic(this.lastPlayedSong);
      }
    }

    showResults(r) {
      // 遊戲結束 → 隱藏退出按鈕
      document.getElementById('game-exit-btn').classList.add('hidden');
      const dn = r.difficulty.charAt(0).toUpperCase() + r.difficulty.slice(1);
      document.getElementById('results-diff-label').textContent = `${r.song.title} · ${dn}`;
      const gradeEl = document.getElementById('grade');
      gradeEl.textContent = r.grade;
      gradeEl.className = 'results-grade ' + r.grade.toLowerCase();
      document.getElementById('final-score').textContent = String(r.score).padStart(6, '0');
      document.getElementById('new-record').classList.toggle('hidden', !r.isNewRecord);
      document.getElementById('max-combo-value').textContent = r.maxCombo || 0;
      document.getElementById('stat-perfect').textContent = r.stats.perfect;
      document.getElementById('stat-good').textContent = r.stats.good;
      document.getElementById('stat-okay').textContent = r.stats.okay;
      document.getElementById('stat-miss').textContent = r.stats.miss;

      // Perfect / Full Combo 徽章
      const badge = document.getElementById('results-perfect-badge');
      const allPerfect = r.stats.perfect > 0
                      && r.stats.good === 0
                      && r.stats.okay === 0
                      && r.stats.miss === 0;
      const fullCombo = !allPerfect
                      && r.stats.miss === 0
                      && (r.stats.perfect + r.stats.good + r.stats.okay) > 0;
      badge.classList.remove('full-combo');
      if (allPerfect) {
        badge.textContent = 'ALL PERFECT';
        badge.classList.remove('hidden');
      } else if (fullCombo) {
        badge.textContent = 'FULL COMBO';
        badge.classList.add('full-combo');
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      document.getElementById('results-screen').classList.remove('hidden');
    }
  }

  // ============================================================
  // BOOT
  // ============================================================
  const app = new App();
  app.init();
  // 解鎖 AudioContext (iOS 安全策略需要)
  const unlock = () => {
    app.game.audio.init();
    document.removeEventListener('click', unlock);
    document.removeEventListener('touchstart', unlock);
  };
  document.addEventListener('click', unlock);
  document.addEventListener('touchstart', unlock);
  </script>
</body>
</html>
